--- START OF FILE Cycle Counter 2.0 ---
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cycle Counter 2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f5f7;
            --surface: #ffffff;
            --surface-2: #f0f0f3;
            --surface-3: #e8e8ec;
            --border: #dcdce2;
            --text: #1a1a1f;
            --text-2: #6b6b78;
            --text-3: #9898a6;
            --accent: #3b6cf5;
            --accent-glow: rgba(59,108,245,0.08);
            --green: #16a34a;
            --green-bg: #f0fdf4;
            --green-border: #bbf7d0;
            --red: #dc2626;
            --red-bg: #fef2f2;
            --red-border: #fecaca;
            --amber: #d97706;
            --amber-bg: #fffbeb;
            --amber-border: #fde68a;
            --radius: 16px;
            --radius-sm: 10px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        .mono { font-family: 'IBM Plex Mono', monospace; }
        button { font-family: inherit; border: none; cursor: pointer; transition: transform 0.1s; }
        button:active { transform: scale(0.96); }

        .screen { display: none; flex-direction: column; flex: 1; overflow: hidden; }
        .screen.active { display: flex; }

        .app-header { padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
        .app-header h1 { font-size: 15px; font-weight: 800; }
        .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); }
        .sync-dot.queued { background: var(--amber); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

        .scroll-area { flex: 1; overflow-y: auto; padding: 16px 16px 120px; -webkit-overflow-scrolling: touch; }
        .section-title { padding: 10px 16px; font-size: 10px; font-weight: 800; text-transform: uppercase; color: var(--text-3); letter-spacing: 1px; }

        .schedule-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); margin: 0 16px 8px; padding: 16px 18px; display: flex; justify-content: space-between; align-items: center; }
        .schedule-card.fresh { border-color: var(--accent); background: var(--accent-glow); }
        .sch-label { font-size: 13px; font-weight: 800; }
        .sch-sub { font-size: 10px; color: var(--text-3); font-weight: 600; }

        .aisle-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 0 16px 20px; }
        .aisle-btn { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 20px 0; text-align: center; font-size: 20px; font-weight: 900; }

        .bin-header { padding: 14px 16px; background: var(--surface); border-bottom: 1px solid var(--border); }
        .bin-input { width: 100%; background: var(--surface-2); border: 2px solid var(--border); border-radius: 10px; padding: 12px; font-family: 'IBM Plex Mono'; font-size: 20px; font-weight: 700; text-align: center; color: var(--accent); outline: none; }

        .hu-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 10px; position: relative; }
        .hu-card.confirmed { border-color: var(--green-border); background: var(--green-bg); }
        .hu-id { font-family: 'IBM Plex Mono'; font-size: 12px; font-weight: 700; color: var(--accent); }
        .hu-status { position: absolute; top: 16px; right: 16px; font-size: 9px; font-weight: 800; text-transform: uppercase; }

        .qty-row { display: flex; align-items: center; gap: 8px; margin: 12px 0; }
        .qty-btn { width: 50px; height: 50px; border-radius: 10px; background: var(--surface-3); font-size: 24px; font-weight: 900; }
        .qty-val { flex: 1; text-align: center; font-size: 32px; font-weight: 800; font-family: 'IBM Plex Mono'; color: var(--accent); }

        .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; padding: 16px; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-top: 1px solid var(--border); }
        .primary-btn { width: 100%; padding: 18px; border-radius: var(--radius); background: var(--accent); color: white; font-size: 15px; font-weight: 800; text-transform: uppercase; }
        .primary-btn.green { background: var(--green); }
        .primary-btn.disabled { background: var(--surface-3); color: var(--text-3); pointer-events: none; }

        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 12px 24px; border-radius: 30px; background: var(--text); color: white; font-size: 12px; font-weight: 700; z-index: 1000; display: none; }
    </style>
</head>
<body>

<div id="toast" class="toast">Saved</div>

<!-- SCREEN: SETUP -->
<div id="screen-setup" class="screen active">
    <div class="app-header">
        <h1>Cycle Counter</h1>
        <div id="sync-dot" class="sync-dot"></div>
    </div>
    <div class="scroll-area">
        <div class="section-title">Priority Counts</div>
        <div id="schedule-list"></div>
        <div class="section-title">Aisle Audit</div>
        <div class="aisle-grid" id="aisle-grid"></div>
    </div>
</div>

<!-- SCREEN: COUNTING -->
<div id="screen-count" class="screen">
    <div class="app-header">
        <button onclick="leaveAisle()" style="font-weight:700;color:var(--text-2);background:none;">← Back</button>
        <h1 id="count-title">Counting</h1>
        <div></div>
    </div>
    <div id="bin-header-area" class="bin-header">
        <input type="text" id="bin-input" class="bin-input" placeholder="SCAN BIN" onchange="selectBin(this.value)">
    </div>
    <div id="hu-list" class="scroll-area"></div>
    <div class="bottom-bar">
        <button id="btn-finalize" onclick="finalizeBin()" class="primary-btn disabled">Finalize Bin</button>
    </div>
</div>

<!-- SCREEN: PRODUCT CYCLE (Used by Fresh) -->
<div id="screen-product-cc" class="screen">
    <div class="app-header">
        <button onclick="exitProductCC()" style="font-weight:700;color:var(--text-2);background:none;">← Back</button>
        <h1 id="pcc-title">Product Count</h1>
        <div></div>
    </div>
    <div class="bin-header" style="text-align:center;">
        <div id="pcc-sku" class="mono" style="font-weight:800;color:var(--accent);font-size:18px;"></div>
        <div id="pcc-desc" style="font-size:11px;color:var(--text-3);margin-top:2px;"></div>
    </div>
    <div id="pcc-list" class="scroll-area"></div>
    <div class="bottom-bar">
        <button id="btn-pcc-finish" onclick="finishProductCC()" class="primary-btn disabled">Complete SKU</button>
    </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbw_huXZUnTzHzTbcdPLG8xga_bwgfsB6SS0wL_e6dyIiDSrKpaHYK4qikcoX-OhHNxg/exec";
const FRESH_SKUS = ["3305704","3307506","3307509","3307515","3307518","3307525","3307710","3308356","3309009","3309016","3309017","3309019","3309138","3309139"];

let sapMaster = JSON.parse(localStorage.getItem('sap2') || '[]');
let binIndex = {};
let cloudReport = [];
let offlineQueue = [];
let currentBin = '', currentItems = [], isFreshMode = false;
let pccProduct = '', pccItems = [];

function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.style.display='block'; setTimeout(()=>t.style.display='none',2000); }

async function sync(){
    try {
        const r = await fetch(API_URL);
        const d = await r.json();
        cloudReport = d.report || [];
        const sapRes = await fetch(API_URL + '?type=sapdata');
        const sapD = await sapRes.json();
        if(sapD.sapData) {
            sapMaster = sapD.sapData;
            localStorage.setItem('sap2', JSON.stringify(sapMaster));
            buildIndex();
        }
        buildSchedule();
        buildAisleGrid();
    } catch(e) {}
}

function buildIndex(){
    binIndex = {};
    sapMaster.forEach(i => {
        if(!binIndex[i.sapBin]) binIndex[i.sapBin] = [];
        binIndex[i.sapBin].push(i);
    });
}

function buildSchedule(){
    const list = document.getElementById('schedule-list');
    list.innerHTML = '';
    
    // Fresh Count Card
    const doneFresh = FRESH_SKUS.filter(sku => cloudReport.some(r => r.prod === sku || r.product === sku)).length;
    const freshCard = document.createElement('div');
    freshCard.className = 'schedule-card fresh';
    freshCard.innerHTML = `<div><div class="sch-label">DAILY FRESH</div><div class="sch-sub">${doneFresh}/${FRESH_SKUS.length} SKUs Completed</div></div><div style="font-weight:900;color:var(--accent);">GO →</div>`;
    freshCard.onclick = startFreshCycle;
    list.appendChild(freshCard);
}

function buildAisleGrid(){
    const grid = document.getElementById('aisle-grid');
    grid.innerHTML = '';
    "ABCDEFGHJKLMNP".split("").forEach(a => {
        const btn = document.createElement('button');
        btn.className = 'aisle-btn'; btn.textContent = a;
        btn.onclick = () => selectBin(`W${a}00A`);
        grid.appendChild(btn);
    });
}

function startFreshCycle(){
    isFreshMode = true;
    document.getElementById('count-title').textContent = "Fresh Checklist";
    document.getElementById('bin-header-area').style.display = 'none';
    const container = document.getElementById('hu-list');
    container.innerHTML = '';
    
    FRESH_SKUS.forEach(sku => {
        const isDone = cloudReport.some(r => r.prod === sku || r.product === sku);
        const item = sapMaster.find(i => i.product === sku);
        const card = document.createElement('div');
        card.className = `hu-card ${isDone ? 'confirmed' : ''}`;
        card.innerHTML = `
            <div class="hu-id">${sku}</div>
            <div style="font-size:11px;color:var(--text-2);margin-top:4px;">${item ? item.desc : 'Fresh Item'}</div>
            <div class="hu-status" style="color:${isDone ? 'var(--green)' : 'var(--accent)'}">${isDone ? 'DONE' : 'PENDING'}</div>
        `;
        if(!isDone) card.onclick = () => startProductCycle(sku);
        container.appendChild(card);
    });
    switchScreen('count');
}

function startProductCycle(sku){
    pccProduct = sku;
    const matches = sapMaster.filter(i => i.product === sku);
    pccItems = matches.map(i => ({ ...i, countQty: null }));
    
    document.getElementById('pcc-sku').textContent = sku;
    document.getElementById('pcc-desc').textContent = matches[0]?.desc || '';
    renderPCCList();
    switchScreen('product-cc');
}

function renderPCCList(){
    const container = document.getElementById('pcc-list');
    container.innerHTML = '';
    pccItems.forEach((item, idx) => {
        const card = document.createElement('div');
        card.className = `hu-card ${item.countQty !== null ? 'confirmed' : ''}`;
        card.innerHTML = `
            <div class="hu-id">${item.sapBin} · HU ...${item.hu.slice(-4)}</div>
            <div class="qty-row">
                <button class="qty-btn" onclick="pccAdjust(${idx}, -1)">-</button>
                <div class="qty-val">${item.countQty !== null ? item.countQty : item.sapQty}</div>
                <button class="qty-btn" onclick="pccAdjust(${idx}, 1)">+</button>
            </div>
            <button onclick="pccConfirm(${idx})" style="width:100%;padding:10px;background:var(--accent);color:white;border-radius:8px;font-weight:800;">CONFIRM ${item.sapQty}</button>
        `;
        container.appendChild(card);
    });
    const allDone = pccItems.every(i => i.countQty !== null);
    const btn = document.getElementById('btn-pcc-finish');
    btn.className = `primary-btn ${allDone ? 'green' : 'disabled'}`;
}

function pccConfirm(idx){ pccItems[idx].countQty = pccItems[idx].sapQty; renderPCCList(); }
function pccAdjust(idx, d){ pccItems[idx].countQty = Math.max(0, (pccItems[idx].countQty || pccItems[idx].sapQty) + d); renderPCCList(); }

async function finishProductCC(){
    const items = pccItems.map(i => ({
        hu: i.hu, product: i.product, desc: i.desc, sapBin: i.sapBin, scannedBin: i.sapBin,
        sapQty: i.sapQty, countQty: i.countQty, type: i.countQty === i.sapQty ? 'ok' : 'adj'
    }));
    await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'logAudit', items, user: 'Counter' }) });
    toast("SKU Saved");
    startFreshCycle(); // Return to checklist
}

function selectBin(b){
    currentBin = b.toUpperCase();
    isFreshMode = false;
    document.getElementById('bin-input').value = currentBin;
    document.getElementById('count-title').textContent = currentBin;
    document.getElementById('bin-header-area').style.display = 'block';
    currentItems = (binIndex[currentBin] || []).map(i => ({ ...i, countQty: null, status: 'pending' }));
    renderHUList();
    switchScreen('count');
}

function renderHUList(){
    const container = document.getElementById('hu-list');
    container.innerHTML = '';
    currentItems.forEach((item, idx) => {
        const card = document.createElement('div');
        card.className = `hu-card ${item.status === 'confirmed' ? 'confirmed' : ''}`;
        card.innerHTML = `
            <div class="hu-id">HU ${item.hu}</div>
            <div style="font-size:11px;margin-top:4px;">${item.product}</div>
            <div class="qty-row">
                <button class="qty-btn" onclick="adjustQty(${idx},-1)">-</button>
                <div class="qty-val">${item.countQty !== null ? item.countQty : item.sapQty}</div>
                <button class="qty-btn" onclick="adjustQty(${idx},1)">+</button>
            </div>
            <button onclick="confirmHU(${idx})" style="width:100%;padding:10px;background:var(--accent);color:white;border-radius:8px;font-weight:800;">CONFIRM</button>
        `;
        container.appendChild(card);
    });
    const allDone = currentItems.every(i => i.status !== 'pending');
    const btn = document.getElementById('btn-finalize');
    btn.className = `primary-btn ${allDone ? 'green' : 'disabled'}`;
}

function confirmHU(idx){ currentItems[idx].countQty = currentItems[idx].sapQty; currentItems[idx].status = 'confirmed'; renderHUList(); }
function adjustQty(idx, d){ currentItems[idx].countQty = Math.max(0, (currentItems[idx].countQty || currentItems[idx].sapQty) + d); currentItems[idx].status = 'confirmed'; renderHUList(); }

async function finalizeBin(){
    const items = currentItems.map(i => ({
        hu: i.hu, product: i.product, desc: i.desc, sapBin: i.sapBin, scannedBin: currentBin,
        sapQty: i.sapQty, countQty: i.countQty, type: i.countQty === i.sapQty ? 'ok' : 'adj'
    }));
    await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'logAudit', items, user: 'Counter', bin: currentBin }) });
    toast("Bin Finalized");
    switchScreen('setup');
    sync();
}

function leaveAisle(){ switchScreen('setup'); }
function exitProductCC(){ isFreshMode ? startFreshCycle() : switchScreen('setup'); }
function switchScreen(id){ document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById('screen-'+id).classList.add('active'); }

window.onload = () => { buildIndex(); sync(); };
</script>
</body>
</html>
