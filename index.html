<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAP PARTY 3D | Warehouse World</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root { --m-red: #e52521; --m-blue: #049cd8; --m-yellow: #fbd000; --m-green: #43b047; }
        body { font-family: 'Segoe UI', sans-serif; perspective: 1000px; background: #5c94fc; }
        .retro-font { font-family: 'Press Start 2P', cursive; }
        
        /* 3D BLOCK STYLE */
        .block-3d {
            position: relative;
            transition: all 0.1s;
            transform-style: preserve-3d;
            border: 4px solid #000;
            box-shadow: 0 8px 0 #000;
            top: 0;
        }
        .block-3d:active {
            top: 4px;
            box-shadow: 0 2px 0 #000;
        }

        /* 3D BOARD TILT */
        .board-tilt {
            transform: rotateX(20deg) translateY(-20px);
            transform-style: preserve-3d;
        }

        /* INTEGRITY CARDS */
        .game-card { 
            border: 4px solid #000; 
            box-shadow: 6px 6px 0px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }
        .card-verified { border-color: var(--m-green); background-color: #f0fdf4; transform: translateZ(10px); }
        .card-missing { border-color: var(--m-red); background-color: #fef2f2; }
        .card-error { animation: shake 0.2s ease-in-out 0s 2; border-color: var(--m-red) !important; }
        
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(5px); } 75% { transform: translateX(-5px); } }
        
        /* STAR ANIMATION */
        @keyframes star-3d {
            0% { transform: rotateY(0deg) scale(0.5); opacity: 0; }
            50% { transform: rotateY(180deg) scale(1.2); }
            100% { transform: rotateY(360deg) scale(1); opacity: 1; }
        }
        .star-get-anim { animation: star-3d 0.8s infinite linear; transform-style: preserve-3d; }

        .bg-pattern {
            background-image: radial-gradient(#ffffff 10%, transparent 10%);
            background-size: 40px 40px;
        }
        
        .nav-active { background-color: var(--m-yellow); color: black; border: 3px solid black; transform: translateY(-4px); box-shadow: 0 4px 0 #000; }
    </style>
</head>
<body class="bg-pattern text-slate-900 flex flex-col h-screen overflow-hidden">

    <!-- Header HUD -->
    <header class="bg-black text-white p-3 shadow-lg shrink-0 border-b-4 border-yellow-400 z-50">
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div id="hud-char" class="w-10 h-10 bg-white rounded border-2 border-white flex items-center justify-center overflow-hidden"></div>
                <div>
                    <h1 class="retro-font text-[10px] tracking-tighter">SAP PARTY <span class="text-blue-400">3D</span></h1>
                    <div id="data-status" class="text-[7px] text-yellow-400 font-bold uppercase mt-1">READY PLAYER 1</div>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <div class="flex items-center bg-slate-800 px-2 py-1 rounded-full border border-slate-600">
                    <span class="mr-1">⭐</span>
                    <span id="star-count" class="retro-font text-[10px]">0</span>
                </div>
                <button onclick="clearAllData()" class="bg-red-600 border-2 border-white px-2 py-1 text-[7px] retro-font">RESET</button>
            </div>
        </div>
    </header>

    <!-- Navigation -->
    <nav class="bg-blue-800 border-b-4 border-black flex p-1 no-print shrink-0 gap-1 z-50">
        <button id="nav-audit" onclick="switchView('audit')" class="flex-1 py-3 text-[8px] retro-font uppercase nav-active">Audit Mode</button>
        <button id="nav-report" onclick="switchView('report')" class="flex-1 py-3 text-[8px] retro-font uppercase text-white">Live Report</button>
    </nav>

    <!-- AUDIT VIEW -->
    <main id="view-audit" class="flex-1 flex flex-col overflow-hidden relative">
        
        <!-- STARTUP / CHARACTER SELECT -->
        <div id="setup-screen" class="absolute inset-0 bg-blue-500 z-40 flex flex-col p-6 overflow-y-auto">
            <div id="char-selection" class="mb-8">
                <h2 class="retro-font text-white text-center text-[10px] mb-8">SELECT YOUR AUDITOR</h2>
                <div class="grid grid-cols-2 gap-4 max-w-xs mx-auto">
                    <button onclick="selectChar('mario')" class="block-3d bg-white p-4 rounded-2xl">
                        <svg viewBox="0 0 16 16" class="w-16 h-16 mx-auto"><path fill="#f00" d="M4 0h8v2H4zM2 2h12v2H2zM0 4h16v3H0z"/><path fill="#fca" d="M3 7h10v4H3zM5 11h6v1H5z"/><path fill="#00f" d="M4 12h8v3H4z"/><circle cx="6" cy="9" r="1"/><circle cx="10" cy="9" r="1"/></svg>
                        <p class="retro-font text-[8px] mt-3">MARIO</p>
                    </button>
                    <button onclick="selectChar('luigi')" class="block-3d bg-white p-4 rounded-2xl">
                        <svg viewBox="0 0 16 16" class="w-16 h-16 mx-auto"><path fill="#0a0" d="M4 0h8v2H4zM2 2h12v2H2zM0 4h16v3H0z"/><path fill="#fca" d="M3 7h10v4H3zM5 11h6v1H5z"/><path fill="#00f" d="M4 12h8v3H4z"/><circle cx="6" cy="9" r="1"/><circle cx="10" cy="9" r="1"/></svg>
                        <p class="retro-font text-[8px] mt-3">LUIGI</p>
                    </button>
                </div>
            </div>

            <div id="upload-prompt" class="flex-1 flex flex-col items-center justify-center text-center">
                <h2 class="retro-font text-xs text-white mb-6">LOAD SAP LEVEL</h2>
                <input type="file" id="sap-upload-main" accept=".xlsx, .xls, .csv" class="hidden" onchange="handleFileUpload(event)">
                <label for="sap-upload-main" class="block-3d w-full max-w-xs bg-green-500 text-white py-5 rounded-2xl retro-font text-[10px] cursor-pointer">CHOOSE FILE</label>
            </div>

            <div id="row-selection" class="hidden board-tilt">
                <h2 class="retro-font text-white text-[10px] mb-10 text-center italic">SELECT A SPACE</h2>
                <div class="grid grid-cols-4 gap-4" id="row-grid"></div>
            </div>
        </div>

        <!-- BIN INPUT HUD -->
        <div class="p-3 bg-white border-b-4 border-black shrink-0 z-10">
            <div class="flex gap-2">
                <button onclick="stepBin(-1)" class="block-3d bg-blue-500 text-white px-4 rounded-xl font-black">◀</button>
                <input type="text" id="bin-input" placeholder="SCAN BIN..." autocomplete="off"
                       class="flex-1 p-4 bg-slate-100 border-4 border-black rounded-xl text-xl font-black text-blue-700 uppercase outline-none"
                       oninput="suggestBins(this.value)">
                <button onclick="stepBin(1)" class="block-3d bg-blue-500 text-white px-4 rounded-xl font-black">▶</button>
            </div>
            <div id="bin-suggestions" class="flex gap-2 mt-3 overflow-x-auto no-scrollbar pb-1"></div>
        </div>

        <!-- LIST AREA -->
        <div id="audit-list" class="flex-1 overflow-y-auto p-3 space-y-4 pb-56"></div>

        <!-- STICKY FOOTER -->
        <div class="fixed bottom-0 left-0 right-0 bg-black p-3 shadow-2xl no-print z-50 border-t-4 border-yellow-400">
            <div class="flex gap-2 mb-3">
                <button onclick="toggleAddForm()" class="block-3d flex-1 bg-orange-500 text-white py-3 rounded-xl retro-font text-[8px]">+ FOUND</button>
                <button onclick="finalizeBin()" class="block-3d flex-1 bg-slate-700 text-slate-300 py-3 rounded-xl retro-font text-[8px]">EMPTY</button>
            </div>
            <button onclick="finalizeBin()" class="block-3d w-full bg-green-500 text-white py-4 rounded-xl retro-font text-[10px]">FINALIZE BIN</button>
        </div>
    </main>

    <!-- STAR MODAL -->
    <div id="row-end-modal" class="hidden fixed inset-0 bg-blue-600/95 z-[70] p-6 flex items-center justify-center">
        <div class="text-center">
            <div class="text-9xl mb-10 star-get-anim">⭐</div>
            <h2 class="retro-font text-white text-xl mb-4">STAR GET!</h2>
            <p id="row-end-text" class="text-yellow-300 retro-font text-[8px] mb-8"></p>
            <div class="space-y-4">
                <button id="btn-next-row" class="block-3d w-full bg-yellow-400 text-black py-4 rounded-2xl retro-font text-[8px]">NEXT AISLE</button>
                <button onclick="openRowSelector()" class="block-3d w-full bg-white text-blue-600 py-4 rounded-2xl retro-font text-[8px]">MAP VIEW</button>
            </div>
        </div>
    </div>

    <!-- REPORT VIEW -->
    <main id="view-report" class="hidden flex-1 flex flex-col overflow-hidden p-3 space-y-3">
        <div class="flex gap-1 overflow-x-auto pb-2 no-print shrink-0 no-scrollbar">
            <button onclick="filterReport('move')" id="f-move" class="block-3d whitespace-nowrap px-4 py-2 rounded-full text-[8px] retro-font bg-white">MOVES</button>
            <button onclick="filterReport('adj')" id="f-adj" class="block-3d whitespace-nowrap px-4 py-2 rounded-full text-[8px] retro-font bg-white">ADJS</button>
            <button onclick="filterReport('inactive')" id="f-inactive" class="block-3d whitespace-nowrap px-4 py-2 rounded-full text-[8px] retro-font bg-white">EXTRAS</button>
            <button onclick="filterReport('missing')" id="f-missing" class="block-3d whitespace-nowrap px-4 py-2 rounded-full text-[8px] retro-font bg-white">MISSING</button>
        </div>
        <div class="flex-1 overflow-y-auto space-y-3" id="report-body"></div>
        <div class="bg-white p-4 rounded-2xl border-4 border-black no-print space-y-3">
            <input type="text" id="email-user" placeholder="Username" class="w-full p-3 border-2 border-black rounded-xl font-bold">
            <button onclick="sendEmailReport()" class="block-3d w-full bg-blue-600 text-white py-4 rounded-xl retro-font text-[8px]">SEND REPORT</button>
        </div>
    </main>

    <!-- MODAL: ADD EXTRA ITEM -->
    <div id="add-item-modal" class="hidden fixed inset-0 bg-black/80 z-[60] p-4 flex items-center justify-center">
        <div class="bg-white w-full max-w-sm rounded-3xl border-4 border-black p-6 space-y-4">
            <h2 class="retro-font text-[10px]">ADD PHYSICAL HU</h2>
            <div class="space-y-3">
                <input type="text" id="add-hu" placeholder="HU Number" class="w-full p-4 bg-slate-100 rounded-xl font-bold border-2 border-black" oninput="autoLookupExtra(this)">
                <input type="text" id="add-prod" placeholder="Product ID" class="w-full p-4 bg-slate-100 rounded-xl font-bold border-2 border-black">
                <input type="number" id="add-qty" placeholder="Count" class="w-full p-5 bg-yellow-50 rounded-xl font-black text-center text-2xl border-2 border-black outline-none">
            </div>
            <div class="flex gap-3">
                <button onclick="toggleAddForm()" class="flex-1 retro-font text-[8px]">BACK</button>
                <button onclick="submitExtra()" class="block-3d flex-[2] bg-orange-500 text-white py-4 rounded-xl retro-font text-[8px]">ADD ITEM</button>
            </div>
        </div>
    </div>

    <script>
        // --- SOUND ENGINE ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSFX(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'coin') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(987.77, now);
                osc.frequency.exponentialRampToValueAtTime(1318.51, now + 0.1);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(now); osc.stop(now + 0.3);
            } else if (type === 'jump') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(600, now + 0.15);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                osc.start(now); osc.stop(now + 0.15);
            } else if (type === 'star') {
                [0, 0.1, 0.2].forEach((t, i) => {
                    const o = audioCtx.createOscillator();
                    o.connect(gain);
                    o.type = 'square';
                    o.frequency.setValueAtTime(523.25 * (1 + i*0.5), now + t);
                    o.start(now + t); o.stop(now + t + 0.1);
                });
            } else if (type === 'buzz') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(110, now);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.2);
                osc.start(now); osc.stop(now + 0.2);
            }
        }

        // --- DATA STATE (Integrity Maintained) ---
        let sapMasterData = JSON.parse(localStorage.getItem('sapMasterData')) || [];
        let auditLog = JSON.parse(localStorage.getItem('auditLog')) || []; 
        let currentBinItems = JSON.parse(localStorage.getItem('currentBinItems')) || [];
        let currentActiveBin = localStorage.getItem('currentActiveBin') || "";
        let binsAudited = new Set(JSON.parse(localStorage.getItem('binsAudited')) || []);
        let stars = parseInt(localStorage.getItem('stars')) || 0;
        let selectedCharacter = localStorage.getItem('selectedCharacter') || 'mario';

        const charSVGs = {
            mario: `<svg viewBox="0 0 16 16"><path fill="#f00" d="M4 0h8v2H4zM2 2h12v2H2zM0 4h16v3H0z"/><path fill="#fca" d="M3 7h10v4H3zM5 11h6v1H5z"/><path fill="#00f" d="M4 12h8v3H4z"/><circle cx="6" cy="9" r="1"/><circle cx="10" cy="9" r="1"/></svg>`,
            luigi: `<svg viewBox="0 0 16 16"><path fill="#0a0" d="M4 0h8v2H4zM2 2h12v2H2zM0 4h16v3H0z"/><path fill="#fca" d="M3 7h10v4H3zM5 11h6v1H5z"/><path fill="#00f" d="M4 12h8v3H4z"/><circle cx="6" cy="9" r="1"/><circle cx="10" cy="9" r="1"/></svg>`
        };

        function saveSession() {
            localStorage.setItem('sapMasterData', JSON.stringify(sapMasterData));
            localStorage.setItem('auditLog', JSON.stringify(auditLog));
            localStorage.setItem('currentBinItems', JSON.stringify(currentBinItems));
            localStorage.setItem('currentActiveBin', currentActiveBin);
            localStorage.setItem('binsAudited', JSON.stringify(Array.from(binsAudited)));
            localStorage.setItem('stars', stars);
            localStorage.setItem('selectedCharacter', selectedCharacter);
            updateHUD();
        }

        function updateHUD() {
            document.getElementById('star-count').innerText = stars;
            document.getElementById('hud-char').innerHTML = charSVGs[selectedCharacter];
        }

        function selectChar(key) {
            playSFX('coin');
            selectedCharacter = key;
            saveSession();
            initSetupGrid();
        }

        window.onload = () => {
            initSetupGrid();
            updateHUD();
            if (sapMasterData.length > 0) unlockAudit();
            if (currentActiveBin) {
                document.getElementById('setup-screen').classList.add('hidden');
                document.getElementById('bin-input').value = currentActiveBin;
                renderAuditList();
                suggestBins("");
            }
        };

        function initSetupGrid() {
            const grid = document.getElementById('row-grid');
            grid.innerHTML = "";
            "ABCDEFGHIJKLMNOP".split("").forEach(row => {
                const btn = document.createElement('button');
                btn.className = "block-3d bg-white p-4 rounded-xl retro-font text-lg";
                btn.innerHTML = row;
                btn.onclick = () => { playSFX('jump'); startAuditAtRow(row); };
                grid.appendChild(btn);
            });
        }

        function unlockAudit() {
            document.getElementById('upload-prompt').classList.add('hidden');
            document.getElementById('row-selection').classList.remove('hidden');
        }

        function startAuditAtRow(rowLetter) {
            document.getElementById('setup-screen').classList.add('hidden');
            selectBin(`W${rowLetter}00A`);
        }

        function openRowSelector() {
            document.getElementById('row-end-modal').classList.add('hidden');
            document.getElementById('setup-screen').classList.remove('hidden');
            initSetupGrid();
        }

        function clearAllData() { if (confirm("RESET GAME?")) { localStorage.clear(); location.reload(); } }

        // --- CORE LOGIC (Integrity Maintained) ---
        function getNextPhysicalBin(current) {
            if (!current) return null;
            let row = current.charAt(1);
            if (current.endsWith("100")) {
                let nextRow = String.fromCharCode(row.charCodeAt(0) + 1);
                return nextRow > 'P' ? null : `W${nextRow}00A`;
            }
            let bay = parseInt(current.substring(2, 4));
            let level = current.charAt(4);
            if (level === 'A') level = 'B';
            else if (level === 'B') level = 'C';
            else {
                if (bay >= 39) return `W${row}100`;
                else { level = 'A'; bay++; }
            }
            return `W${row}${bay.toString().padStart(2, '0')}${level}`;
        }

        function getPrevPhysicalBin(current) {
            if (!current) return null;
            let row = current.charAt(1);
            if (current.endsWith("100")) return `W${row}39C`;
            let bay = parseInt(current.substring(2, 4));
            let level = current.charAt(4);
            if (level === 'C') level = 'B';
            else if (level === 'B') level = 'A';
            else {
                if (bay === 0) return null;
                level = 'C'; bay--;
            }
            return `W${row}${bay.toString().padStart(2, '0')}${level}`;
        }

        function stepBin(dir) {
            playSFX('jump');
            const next = dir > 0 ? getNextPhysicalBin(currentActiveBin) : getPrevPhysicalBin(currentActiveBin);
            if (next) selectBin(next);
        }

        function suggestBins(val) {
            const container = document.getElementById('bin-suggestions');
            container.innerHTML = "";
            if (currentActiveBin) {
                const bayPrefix = currentActiveBin.substring(0, 4);
                ['A', 'B', 'C'].forEach(lvl => {
                    const btn = document.createElement('button');
                    btn.className = `block-3d px-6 py-2 rounded-lg retro-font text-[8px] ${currentActiveBin.endsWith(lvl) && !currentActiveBin.endsWith("100") ? 'bg-yellow-400' : 'bg-white'}`;
                    btn.innerText = lvl;
                    btn.onclick = () => { playSFX('jump'); selectBin(bayPrefix + lvl); };
                    container.appendChild(btn);
                });
            }
        }

        function selectBin(binName) {
            document.getElementById('bin-input').value = binName;
            currentActiveBin = binName.toUpperCase();
            const expected = sapMasterData.filter(i => i.sapBin === currentActiveBin);
            currentBinItems = expected.map(i => ({ 
                ...i, verified: false, isMissing: false, countQty: 0, isExtra: false, scannedBin: currentActiveBin 
            }));
            saveSession(); renderAuditList(); suggestBins("");
        }

        function finalizeBin() {
            if(!currentActiveBin) return;
            let errors = false;
            currentBinItems.forEach((item, index) => {
                if ((item.verified && item.countQty <= 0) || (!item.verified && !item.isMissing)) {
                    document.getElementById(`card-${index}`).classList.add('card-error'); errors = true;
                }
            });
            if (errors) { playSFX('buzz'); return; }
            
            auditLog.push(...currentBinItems);
            binsAudited.add(currentActiveBin);
            
            if (currentActiveBin.endsWith("100")) {
                stars++; playSFX('star');
                showRowEndPrompt(currentActiveBin.charAt(1), getNextPhysicalBin(currentActiveBin));
            } else {
                playSFX('coin');
                const next = getNextPhysicalBin(currentActiveBin);
                if (next) selectBin(next);
            }
            saveSession(); renderAuditList(); window.scrollTo(0,0);
        }

        function showRowEndPrompt(finishedRow, nextBin) {
            const modal = document.getElementById('row-end-modal');
            document.getElementById('row-end-text').innerText = `AISLE ${finishedRow} COMPLETE!`;
            const nextBtn = document.getElementById('btn-next-row');
            if (nextBin) {
                nextBtn.onclick = () => { modal.classList.add('hidden'); selectBin(nextBin); };
                nextBtn.classList.remove('hidden');
            } else { nextBtn.classList.add('hidden'); }
            modal.classList.remove('hidden');
        }

        function renderAuditList() {
            const container = document.getElementById('audit-list');
            container.innerHTML = "";
            currentBinItems.forEach((item, index) => {
                const card = document.createElement('div');
                card.id = `card-${index}`;
                card.className = `p-4 rounded-2xl game-card bg-white ${item.verified ? 'card-verified' : (item.isMissing ? 'card-missing' : '')}`;
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-3">
                        <div class="flex-1">
                            <span class="inline-block px-2 py-0.5 bg-black text-white font-mono text-[10px] rounded mb-2">HU: ${item.hu}</span>
                            <h3 class="text-sm font-black leading-tight">${item.product}</h3>
                        </div>
                        <div class="text-right">
                            <p class="text-[8px] font-black text-slate-400 uppercase">SAP</p>
                            <p class="text-lg font-black text-slate-700">${item.sapQty}</p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="quickConfirm(${index})" class="block-3d flex-1 bg-green-500 text-white py-3 rounded-xl retro-font text-[8px]">GOT IT</button>
                        <button onclick="toggleMissing(${index})" class="block-3d flex-1 bg-red-500 text-white py-3 rounded-xl retro-font text-[8px]">MISSING</button>
                    </div>`;
                container.appendChild(card);
            });
        }

        function quickConfirm(idx) {
            playSFX('coin');
            currentBinItems[idx].countQty = currentBinItems[idx].sapQty;
            currentBinItems[idx].verified = true;
            saveSession(); renderAuditList();
        }

        function toggleMissing(idx) {
            playSFX('buzz');
            currentBinItems[idx].isMissing = !currentBinItems[idx].isMissing;
            saveSession(); renderAuditList();
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                const workbook = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
                const raw = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                sapMasterData = raw.map(row => ({
                    sapBin: String(row['Storage Bin'] || row['Storage bin'] || "").trim().toUpperCase(),
                    hu: String(row['Handling Unit'] || row['HU'] || "").trim(),
                    product: String(row['Product'] || ""),
                    desc: row['Product Short Description'] || "",
                    uom: row['Base Unit of Measure'] || "EA",
                    sapQty: parseFloat(row['Quantity']) || 0
                }));
                playSFX('star'); unlockAudit(); saveSession();
            };
            reader.readAsArrayBuffer(file);
        }

        function toggleAddForm() { playSFX('jump'); document.getElementById('add-item-modal').classList.toggle('hidden'); }

        function submitExtra() {
            const hu = document.getElementById('add-hu').value.trim();
            const prod = document.getElementById('add-prod').value.trim();
            const qty = parseFloat(document.getElementById('add-qty').value) || 0;
            if(!hu || !prod || qty <= 0) return;
            playSFX('coin');
            currentBinItems.push({ hu, product: prod, sapQty: 0, scannedBin: currentActiveBin, countQty: qty, verified: true, isExtra: true });
            toggleAddForm(); saveSession(); renderAuditList();
        }

        function switchView(view) {
            playSFX('jump');
            document.getElementById('view-audit').classList.toggle('hidden', view !== 'audit');
            document.getElementById('view-report').classList.toggle('hidden', view !== 'report');
            document.getElementById('nav-audit').classList.toggle('nav-active', view === 'audit');
            document.getElementById('nav-report').classList.toggle('nav-active', view === 'report');
            if(view === 'report') filterReport('move');
        }

        function getReconciledData() {
            const allRecords = [...auditLog, ...currentBinItems];
            const huMap = {};
            allRecords.forEach(rec => {
                if (!huMap[rec.hu]) huMap[rec.hu] = { ...rec };
            });
            return Object.values(huMap);
        }

        function filterReport(type) {
            const container = document.getElementById('report-body');
            container.innerHTML = "";
            const reconciled = getReconciledData();
            let filtered = reconciled.filter(i => {
                if (type === 'move') return i.sapBin && i.sapBin !== i.scannedBin;
                if (type === 'missing') return i.isMissing;
                return true;
            });
            filtered.forEach(i => {
                const div = document.createElement('div');
                div.className = "p-4 bg-white border-4 border-black rounded-xl";
                div.innerHTML = `<p class="retro-font text-[7px]">HU: ${i.hu}</p><p class="text-xs font-bold">${i.product}</p>`;
                container.appendChild(div);
            });
        }

        function sendEmailReport() {
            const user = document.getElementById('email-user').value.trim();
            if (!user) return alert("Enter user");
            window.location.href = `mailto:${user}@novusfoods.com?subject=Audit&body=Stars: ${stars}`;
        }

        function autoLookupExtra(input) {
            if (input.value.length >= 8) {
                const match = sapMasterData.find(i => i.hu === input.value);
                if (match) { document.getElementById('add-prod').value = match.product; playSFX('coin'); }
            }
        }
    </script>
</body>
</html>
