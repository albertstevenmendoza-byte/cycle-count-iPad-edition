<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAP PARTY | Audit World</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --mario-red: #e52521;
            --mario-blue: #049cd8;
            --mario-yellow: #fbd000;
            --mario-green: #43b047;
        }
        body { font-family: 'Segoe UI', sans-serif; }
        .retro-font { font-family: 'Press Start 2P', cursive; }
        
        /* Background Pattern */
        .bg-pattern {
            background-color: #5c94fc;
            background-image: radial-gradient(#ffffff 10%, transparent 10%);
            background-size: 40px 40px;
        }

        /* Character Pixel Art Styles */
        .char-sprite {
            width: 40px;
            height: 40px;
            display: inline-block;
            image-rendering: pixelated;
        }

        /* Animation for Stars */
        @keyframes star-jump {
            0% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-50px) scale(1.5) rotate(180deg); }
            100% { transform: translateY(0) scale(1) rotate(360deg); }
        }
        .star-anim { animation: star-jump 1s infinite ease-in-out; }

        /* Game UI Elements */
        .game-card { border: 4px solid #000; box-shadow: 6px 6px 0px rgba(0,0,0,0.2); }
        .card-verified { background-color: #dcfce7; border-color: var(--mario-green); }
        .card-missing { background-color: #fee2e2; border-color: var(--mario-red); }
        .nav-active { background-color: var(--mario-yellow); color: black; border: 3px solid black; transform: translateY(-4px); }

        /* Custom Scrollbar */
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-pattern text-slate-900 flex flex-col h-screen overflow-hidden">

    <!-- Header HUD -->
    <header class="bg-black text-white p-3 shadow-lg shrink-0 border-b-4 border-yellow-400">
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div id="active-char-icon" class="w-10 h-10 bg-white rounded-lg border-2 border-white overflow-hidden flex items-center justify-center">
                    <!-- Character SVG will be injected here -->
                </div>
                <div>
                    <h1 class="retro-font text-[10px] tracking-tighter">SAP PARTY</h1>
                    <div class="flex gap-2 items-center mt-1">
                        <span class="text-yellow-400 text-xs">⭐</span>
                        <span id="star-count" class="retro-font text-[10px]">0</span>
                    </div>
                </div>
            </div>
            <button onclick="clearAllData()" class="bg-red-600 border-2 border-white px-2 py-1 text-[8px] retro-font">RESET</button>
        </div>
    </header>

    <!-- Nav -->
    <nav class="bg-blue-800 flex p-1 gap-1 border-b-4 border-black">
        <button id="nav-audit" onclick="switchView('audit')" class="flex-1 py-3 text-[8px] retro-font nav-active">AUDIT</button>
        <button id="nav-report" onclick="switchView('report')" class="flex-1 py-3 text-[8px] retro-font text-white">REPORT</button>
    </nav>

    <!-- MAIN GAME AREA -->
    <main id="view-audit" class="flex-1 flex flex-col overflow-hidden relative">
        
        <!-- CHARACTER SELECT / START SCREEN -->
        <div id="setup-screen" class="absolute inset-0 bg-blue-500 z-40 flex flex-col p-6 overflow-y-auto">
            <div id="char-selection" class="text-center">
                <h2 class="retro-font text-white text-sm mb-8">CHOOSE YOUR AUDITOR</h2>
                <div class="grid grid-cols-2 gap-4 max-w-xs mx-auto">
                    <!-- Mario -->
                    <button onclick="selectChar('mario')" class="bg-white p-4 rounded-xl border-4 border-black hover:bg-yellow-100 transition-colors">
                        <svg viewBox="0 0 16 16" class="w-16 h-16"><path fill="#f00" d="M4 0h8v2H4zM2 2h12v2H2zM0 4h16v3H0z"/><path fill="#fca" d="M3 7h10v4H3zM5 11h6v1H5z"/><path fill="#00f" d="M4 12h8v3H4z"/><circle cx="6" cy="9" r="1"/><circle cx="10" cy="9" r="1"/></svg>
                        <p class="retro-font text-[8px] mt-2">MARIO</p>
                    </button>
                    <!-- Luigi -->
                    <button onclick="selectChar('luigi')" class="bg-white p-4 rounded-xl border-4 border-black hover:bg-yellow-100 transition-colors">
                        <svg viewBox="0 0 16 16" class="w-16 h-16"><path fill="#0a0" d="M4 0h8v2H4zM2 2h12v2H2zM0 4h16v3H0z"/><path fill="#fca" d="M3 7h10v4H3zM5 11h6v1H5z"/><path fill="#00f" d="M4 12h8v3H4z"/><circle cx="6" cy="9" r="1"/><circle cx="10" cy="9" r="1"/></svg>
                        <p class="retro-font text-[8px] mt-2">LUIGI</p>
                    </button>
                    <!-- Peach -->
                    <button onclick="selectChar('peach')" class="bg-white p-4 rounded-xl border-4 border-black hover:bg-yellow-100 transition-colors">
                        <svg viewBox="0 0 16 16" class="w-16 h-16"><path fill="#f9c" d="M4 0h8v7H4z"/><path fill="#ff0" d="M4 0l2 2 2-2 2 2 2-2v2H4z"/><path fill="#fca" d="M5 3h6v4H5z"/><path fill="#f9c" d="M2 7h12v9H2z"/><circle cx="8" cy="5" r="1" fill="#0cf"/></svg>
                        <p class="retro-font text-[8px] mt-2">PEACH</p>
                    </button>
                    <!-- Toad -->
                    <button onclick="selectChar('toad')" class="bg-white p-4 rounded-xl border-4 border-black hover:bg-yellow-100 transition-colors">
                        <svg viewBox="0 0 16 16" class="w-16 h-16"><path fill="#fff" d="M3 0h10v7H3z"/><circle fill="red" cx="8" cy="2" r="2"/><circle fill="red" cx="4" cy="4" r="2"/><circle fill="red" cx="12" cy="4" r="2"/><path fill="#fca" d="M5 7h6v4H5z"/><path fill="#fff" d="M4 11h8v5H4z"/><path fill="#00f" d="M4 11h1v3h6v-3h1v5H4z"/></svg>
                        <p class="retro-font text-[8px] mt-2">TOAD</p>
                    </button>
                </div>
            </div>

            <div id="upload-prompt" class="hidden mt-12 flex flex-col items-center">
                <h2 class="retro-font text-white text-xs mb-6">INSERT SAP DISK</h2>
                <input type="file" id="sap-upload-main" accept=".xlsx, .xls, .csv" class="hidden" onchange="handleFileUpload(event)">
                <label for="sap-upload-main" class="bg-green-500 text-white px-8 py-4 rounded-xl border-4 border-black retro-font text-[10px] shadow-lg cursor-pointer">LOAD FILE</label>
            </div>

            <div id="row-selection" class="hidden mt-8">
                <h2 class="retro-font text-white text-[10px] mb-4 text-center italic">SELECT AISLE</h2>
                <div class="grid grid-cols-4 gap-2" id="row-grid"></div>
            </div>
        </div>

        <!-- LIST AREA -->
        <div class="p-3 bg-white border-b-4 border-black">
            <div class="flex gap-2">
                <button onclick="stepBin(-1)" class="bg-blue-500 text-white px-4 rounded-lg border-2 border-black font-bold">◀</button>
                <input type="text" id="bin-input" placeholder="SCAN BIN..." class="flex-1 p-3 bg-slate-100 border-2 border-black rounded-lg font-black text-blue-700 uppercase outline-none">
                <button onclick="stepBin(1)" class="bg-blue-500 text-white px-4 rounded-lg border-2 border-black font-bold">▶</button>
            </div>
            <div id="bin-suggestions" class="flex gap-2 mt-2 overflow-x-auto no-scrollbar"></div>
        </div>

        <div id="audit-list" class="flex-1 overflow-y-auto p-3 space-y-4 pb-48"></div>

        <!-- FOOTER HUD -->
        <div class="fixed bottom-0 left-0 right-0 bg-black p-3 border-t-4 border-yellow-400 z-50">
            <div class="flex gap-2 mb-2">
                <button onclick="toggleAddForm()" class="flex-1 bg-orange-400 py-2 rounded border-2 border-black retro-font text-[8px]">+ ITEM</button>
                <button onclick="finalizeBin()" class="flex-1 bg-green-500 py-2 rounded border-2 border-black retro-font text-[8px] text-white">FINALIZE</button>
            </div>
        </div>
    </main>

    <!-- STAR MODAL -->
    <div id="row-end-modal" class="hidden fixed inset-0 bg-blue-600/95 z-[70] flex items-center justify-center p-6">
        <div class="text-center">
            <div class="text-8xl mb-6 star-anim">⭐</div>
            <h2 class="retro-font text-white text-xl mb-4">AISLE CLEAR!</h2>
            <p id="row-end-text" class="retro-font text-yellow-300 text-[8px] mb-8"></p>
            <button id="btn-next-row" class="w-full bg-yellow-400 p-4 border-4 border-black retro-font text-[10px]">NEXT LEVEL</button>
        </div>
    </div>

    <script>
        // --- DATA & GAME STATE ---
        let sapMasterData = JSON.parse(localStorage.getItem('sapMasterData')) || [];
        let auditLog = JSON.parse(localStorage.getItem('auditLog')) || []; 
        let currentBinItems = JSON.parse(localStorage.getItem('currentBinItems')) || [];
        let currentActiveBin = localStorage.getItem('currentActiveBin') || "";
        let binsAudited = new Set(JSON.parse(localStorage.getItem('binsAudited')) || []);
        let stars = parseInt(localStorage.getItem('stars')) || 0;
        let selectedCharacter = localStorage.getItem('selectedCharacter') || 'mario';

        const charSVGs = {
            mario: `<svg viewBox="0 0 16 16" class="w-8 h-8"><path fill="#f00" d="M4 0h8v2H4zM2 2h12v2H2zM0 4h16v3H0z"/><path fill="#fca" d="M3 7h10v4H3zM5 11h6v1H5z"/><path fill="#00f" d="M4 12h8v3H4z"/><circle cx="6" cy="9" r="1"/><circle cx="10" cy="9" r="1"/></svg>`,
            luigi: `<svg viewBox="0 0 16 16" class="w-8 h-8"><path fill="#0a0" d="M4 0h8v2H4zM2 2h12v2H2zM0 4h16v3H0z"/><path fill="#fca" d="M3 7h10v4H3zM5 11h6v1H5z"/><path fill="#00f" d="M4 12h8v3H4z"/><circle cx="6" cy="9" r="1"/><circle cx="10" cy="9" r="1"/></svg>`,
            peach: `<svg viewBox="0 0 16 16" class="w-8 h-8"><path fill="#f9c" d="M4 0h8v7H4z"/><path fill="#ff0" d="M4 0l2 2 2-2 2 2 2-2v2H4z"/><path fill="#fca" d="M5 3h6v4H5z"/><path fill="#f9c" d="M2 7h12v9H2z"/><circle cx="8" cy="5" r="1" fill="#0cf"/></svg>`,
            toad: `<svg viewBox="0 0 16 16" class="w-8 h-8"><path fill="#fff" d="M3 0h10v7H3z"/><circle fill="red" cx="8" cy="2" r="2"/><circle fill="red" cx="4" cy="4" r="2"/><circle fill="red" cx="12" cy="4" r="2"/><path fill="#fca" d="M5 7h6v4H5z"/><path fill="#fff" d="M4 11h8v5H4z"/></svg>`
        };

        function saveSession() {
            localStorage.setItem('sapMasterData', JSON.stringify(sapMasterData));
            localStorage.setItem('auditLog', JSON.stringify(auditLog));
            localStorage.setItem('currentBinItems', JSON.stringify(currentBinItems));
            localStorage.setItem('currentActiveBin', currentActiveBin);
            localStorage.setItem('binsAudited', JSON.stringify(Array.from(binsAudited)));
            localStorage.setItem('stars', stars);
            localStorage.setItem('selectedCharacter', selectedCharacter);
            updateHUD();
        }

        function updateHUD() {
            document.getElementById('star-count').innerText = stars;
            document.getElementById('active-char-icon').innerHTML = charSVGs[selectedCharacter];
        }

        function selectChar(key) {
            selectedCharacter = key;
            document.getElementById('char-selection').classList.add('hidden');
            document.getElementById('upload-prompt').classList.remove('hidden');
            if(sapMasterData.length > 0) unlockAudit();
            saveSession();
        }

        window.onload = () => {
            updateHUD();
            initSetupGrid();
            if (sapMasterData.length > 0) unlockAudit();
            if (currentActiveBin) {
                document.getElementById('setup-screen').classList.add('hidden');
                document.getElementById('bin-input').value = currentActiveBin;
                renderAuditList();
            }
        };

        function unlockAudit() {
            document.getElementById('upload-prompt').classList.add('hidden');
            document.getElementById('row-selection').classList.remove('hidden');
        }

        function initSetupGrid() {
            const grid = document.getElementById('row-grid');
            grid.innerHTML = "";
            "ABCDEFGHIJKLMNOP".split("").forEach(row => {
                const btn = document.createElement('button');
                btn.className = "bg-white border-2 border-black p-3 rounded-lg retro-font text-[10px] shadow-md active:bg-yellow-400";
                btn.innerText = row;
                btn.onclick = () => {
                    document.getElementById('setup-screen').classList.add('hidden');
                    selectBin(`W${row}00A`);
                };
                grid.appendChild(btn);
            });
        }

        function selectBin(binName) {
            document.getElementById('bin-input').value = binName;
            currentActiveBin = binName.toUpperCase();
            const expected = sapMasterData.filter(i => i.sapBin === currentActiveBin);
            currentBinItems = expected.map(i => ({ 
                ...i, verified: false, isMissing: false, countQty: 0, isExtra: false, scannedBin: currentActiveBin 
            }));
            saveSession(); renderAuditList(); suggestBins();
        }

        function finalizeBin() {
            if(!currentActiveBin) return;
            auditLog.push(...currentBinItems);
            binsAudited.add(currentActiveBin);
            
            if (currentActiveBin.endsWith("100")) {
                stars++;
                saveSession();
                showRowEndPrompt(currentActiveBin.charAt(1));
            } else {
                const next = getNextPhysicalBin(currentActiveBin);
                if(next) selectBin(next);
            }
            saveSession(); renderAuditList();
        }

        function showRowEndPrompt(row) {
            const modal = document.getElementById('row-end-modal');
            document.getElementById('row-end-text').innerText = `YOU MASTERED AISLE ${row}`;
            document.getElementById('btn-next-row').onclick = () => {
                modal.classList.add('hidden');
                const nextRow = String.fromCharCode(row.charCodeAt(0) + 1);
                if(nextRow <= 'P') selectBin(`W${nextRow}00A`);
            };
            modal.classList.remove('hidden');
        }

        function renderAuditList() {
            const container = document.getElementById('audit-list');
            container.innerHTML = "";
            currentBinItems.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = `p-4 rounded-xl game-card bg-white space-y-3 ${item.verified ? 'card-verified' : ''}`;
                card.innerHTML = `
                    <div class="flex justify-between">
                        <div class="retro-font text-[8px]">${item.hu}</div>
                        <div class="font-bold text-blue-600">${item.sapQty} ${item.uom}</div>
                    </div>
                    <div class="text-xs font-black uppercase">${item.product}</div>
                    <div class="flex gap-2">
                        <button onclick="quickConfirm(${index})" class="flex-1 bg-green-500 text-white py-3 rounded border-2 border-black retro-font text-[8px]">GOT IT</button>
                        <button onclick="toggleMissing(${index})" class="flex-1 bg-red-500 text-white py-3 rounded border-2 border-black retro-font text-[8px]">MISSING</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function quickConfirm(idx) {
            currentBinItems[idx].countQty = currentBinItems[idx].sapQty;
            currentBinItems[idx].verified = true;
            saveSession(); renderAuditList();
        }

        function toggleMissing(idx) {
            currentBinItems[idx].isMissing = true;
            currentBinItems[idx].verified = false;
            saveSession(); renderAuditList();
        }

        function stepBin(dir) {
            const next = dir > 0 ? getNextPhysicalBin(currentActiveBin) : getPrevPhysicalBin(currentActiveBin);
            if (next) selectBin(next);
        }

        function getNextPhysicalBin(current) {
            if (!current) return null;
            let row = current.charAt(1), bay = parseInt(current.substring(2, 4)), level = current.charAt(4);
            if (current.endsWith("100")) return null;
            if (level === 'A') level = 'B';
            else if (level === 'B') level = 'C';
            else { if (bay >= 39) return `W${row}100`; else { level = 'A'; bay++; } }
            return `W${row}${bay.toString().padStart(2, '0')}${level}`;
        }

        function getPrevPhysicalBin(current) {
            if (!current) return null;
            let row = current.charAt(1), bay = parseInt(current.substring(2, 4)), level = current.charAt(4);
            if (current.endsWith("100")) return `W${row}39C`;
            if (level === 'C') level = 'B';
            else if (level === 'B') level = 'A';
            else { if (bay === 0) return null; level = 'C'; bay--; }
            return `W${row}${bay.toString().padStart(2, '0')}${level}`;
        }

        function suggestBins() {
            const container = document.getElementById('bin-suggestions');
            container.innerHTML = "";
            if (!currentActiveBin) return;
            const prefix = currentActiveBin.substring(0, 4);
            ['A', 'B', 'C'].forEach(l => {
                const btn = document.createElement('button');
                btn.className = "px-4 py-2 bg-white border-2 border-black rounded retro-font text-[8px] shrink-0";
                btn.innerText = l;
                btn.onclick = () => selectBin(prefix + l);
                container.appendChild(btn);
            });
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                const workbook = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
                const raw = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                sapMasterData = raw.map(row => ({
                    sapBin: String(row['Storage Bin'] || row['Storage bin'] || "").trim().toUpperCase(),
                    hu: String(row['Handling Unit'] || row['HU'] || "").trim(),
                    product: String(row['Product'] || ""),
                    desc: row['Product Short Description'] || "",
                    uom: row['Base Unit of Measure'] || "EA",
                    sapQty: parseFloat(row['Quantity']) || 0
                }));
                saveSession(); unlockAudit();
            };
            reader.readAsArrayBuffer(file);
        }

        function switchView(view) {
            document.getElementById('view-audit').classList.toggle('hidden', view !== 'audit');
            document.getElementById('view-report').classList.toggle('hidden', view !== 'report');
            document.getElementById('nav-audit').classList.toggle('nav-active', view === 'audit');
            document.getElementById('nav-report').classList.toggle('nav-active', view === 'report');
        }

        function clearAllData() { if(confirm("RESET GAME?")) { localStorage.clear(); location.reload(); } }
    </script>
</body>
</html>
