<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cycle Counter 2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f5f7;
            --surface: #ffffff;
            --surface-2: #f0f0f3;
            --surface-3: #e8e8ec;
            --border: #dcdce2;
            --text: #1a1a1f;
            --text-2: #6b6b78;
            --text-3: #9898a6;
            --accent: #3b6cf5;
            --accent-glow: rgba(59,108,245,0.08);
            --green: #16a34a;
            --green-bg: #f0fdf4;
            --green-border: #bbf7d0;
            --red: #dc2626;
            --red-bg: #fef2f2;
            --red-border: #fecaca;
            --amber: #d97706;
            --amber-bg: #fffbeb;
            --amber-border: #fde68a;
            --purple: #7c3aed;
            --purple-bg: #f5f3ff;
            --purple-border: #ddd6fe;
            --cyan: #0891b2;
            --cyan-bg: #ecfeff;
            --cyan-border: #a5f3fc;
            --radius: 16px;
            --radius-sm: 10px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.03);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); overscroll-behavior: none; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        .mono { font-family: 'IBM Plex Mono', monospace; }
        button { font-family: inherit; border: none; cursor: pointer; -webkit-user-select: none; user-select: none; }
        button:active { transform: scale(0.96); }
        input { font-family: inherit; }
        /* ===== SCREENS ===== */
        .screen { display: none; flex-direction: column; flex: 1; overflow: hidden; }
        .screen.active { display: flex; }
        /* ===== HEADER ===== */
        .app-header { padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); flex-shrink: 0; background: var(--surface); box-shadow: var(--shadow-sm); }
        .app-header h1 { font-size: 15px; font-weight: 800; letter-spacing: -0.3px; }
        .header-right { display: flex; align-items: center; gap: 10px; }
        .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); }
        .sync-dot.offline { background: var(--red); animation: pulse 1.5s infinite; }
        .sync-dot.queued { background: var(--amber); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
        .name-btn { background: var(--surface-2); color: var(--text-2); padding: 8px 14px; border-radius: var(--radius-sm); font-size: 11px; font-weight: 700; }
        /* ===== PHASE INDICATOR ===== */
        .phase-bar { display: flex; gap: 2px; padding: 12px 16px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .phase-step { flex: 1; height: 4px; border-radius: 2px; background: var(--surface-3); transition: background 0.4s; }
        .phase-step.done { background: var(--green); }
        .phase-step.active { background: var(--accent); animation: phase-glow 1.5s ease infinite; }
        @keyframes phase-glow { 0%,100%{ box-shadow: 0 0 0 0 var(--accent-glow); } 50%{ box-shadow: 0 0 8px 4px var(--accent-glow); } }
        .phase-label { display: flex; justify-content: space-between; padding: 0 16px 8px; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-3); }
        .phase-label span.active { color: var(--accent); }
        .phase-label span.done { color: var(--green); }
        /* ===== TUTORIAL HINTS ===== */
        .hint { background: var(--accent-glow); border: 1px solid rgba(79,125,249,0.2); border-radius: var(--radius); padding: 14px 18px; margin: 12px 20px 0; display: flex; align-items: flex-start; gap: 12px; animation: hint-in 0.4s cubic-bezier(0.16,1,0.3,1); }
        .hint-icon { font-size: 20px; flex-shrink: 0; margin-top: 1px; }
        .hint-body { flex: 1; }
        .hint-body p { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.5; }
        .hint-body small { font-size: 10px; color: var(--text-2); font-weight: 600; }
        .hint-dismiss { color: var(--text-3); font-size: 10px; font-weight: 700; background: none; padding: 4px 8px; white-space: nowrap; }
        @keyframes hint-in { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
        /* ===== SCROLLABLE CONTENT ===== */
        .scroll-area { flex: 1; overflow-y: auto; padding: 16px 16px 240px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        .scroll-area::-webkit-scrollbar { display: none; }
        /* ===== HU CARDS ===== */
        .hu-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 10px; transition: all 0.25s; box-shadow: var(--shadow-sm); }
        .hu-card.confirmed { border-color: var(--green-border); background: var(--green-bg); }
        .hu-card.missing { border-color: var(--red-border); background: var(--red-bg); opacity: 0.65; }
        .hu-card.adjusted { border-color: var(--amber-border); background: var(--amber-bg); }
        .hu-card.movement { border-color: var(--purple-border); background: var(--purple-bg); }
        .hu-card.extra { border-color: var(--cyan-border, rgba(34,211,238,0.25)); background: var(--cyan-bg, #ecfeff); }
        .hu-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .hu-id { font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 700; color: var(--accent); background: var(--accent-glow); padding: 4px 10px; border-radius: 6px; border: 1px solid rgba(59,108,245,0.15); }
        .hu-status { font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; padding: 4px 10px; border-radius: 6px; }
        .hu-status.ok { color: var(--green); background: var(--green-bg); }
        .hu-status.miss { color: var(--red); background: var(--red-bg); }
        .hu-status.adj { color: var(--amber); background: var(--amber-bg); }
        .hu-status.move { color: var(--purple); background: var(--purple-bg); }
        .hu-status.ext { color: var(--cyan); background: var(--cyan-bg, #ecfeff); }
        .hu-meta { display: flex; gap: 16px; margin-bottom: 12px; }
        .hu-meta-item { }
        .hu-meta-label { font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; color: var(--text-3); }
        .hu-meta-value { font-size: 14px; font-weight: 700; color: var(--text); margin-top: 1px; }
        .hu-meta-value.mono { font-family: 'IBM Plex Mono', monospace; font-size: 13px; }
        .hu-actions { display: flex; gap: 8px; }
        .hu-btn { flex: 1; padding: 16px 0; border-radius: var(--radius-sm); font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; transition: all 0.15s; text-align: center; min-height: 52px; }
        .hu-btn.confirm { background: var(--green); color: white; }
        .hu-btn.miss-btn { background: var(--surface-3); color: var(--red); border: 1.5px solid var(--red-border); }
        .hu-btn.miss-btn.active { background: var(--red); color: white; }
        /* ===== QTY STEPPER ===== */
        .qty-row { display: flex; align-items: center; gap: 6px; background: var(--surface-2); border-radius: var(--radius-sm); padding: 8px; margin-bottom: 10px; }
        .qty-stepper { width: 60px; height: 60px; border-radius: var(--radius-sm); background: var(--surface-3); color: var(--text); font-size: 26px; font-weight: 900; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .qty-input { flex: 1; background: transparent; border: none; text-align: center; font-family: 'IBM Plex Mono', monospace; font-size: 36px; font-weight: 700; color: var(--accent); outline: none; min-width: 0; }
        .qty-input::placeholder { color: var(--text-3); }
        .sap-qty-badge { font-size: 10px; font-weight: 700; color: var(--text-3); text-align: center; padding: 4px; }
        .sap-qty-badge strong { color: var(--text-2); }
        /* ===== BOTTOM BAR ===== */
        .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; padding: 12px 16px calc(env(safe-area-inset-bottom, 16px) + 12px); background: rgba(255,255,255,0.95); backdrop-filter: blur(24px) saturate(180%); -webkit-backdrop-filter: blur(24px) saturate(180%); border-top: 1px solid var(--border); z-index: 50; box-shadow: 0 -4px 20px rgba(0,0,0,0.06); }
        .primary-btn { width: 100%; padding: 20px 0; border-radius: var(--radius); font-size: 15px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 8px; min-height: 58px; }
        .primary-btn.blue { background: var(--accent); color: white; }
        .primary-btn.green { background: var(--green); color: white; }
        .primary-btn.disabled { background: var(--surface-3); color: var(--text-3); pointer-events: none; }
        .secondary-row { display: flex; gap: 8px; margin-bottom: 10px; }
        .secondary-btn { flex: 1; padding: 16px 0; border-radius: var(--radius-sm); font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; background: var(--surface-2); color: var(--text-2); border: 1.5px solid var(--border); text-align: center; min-height: 50px; }
        .secondary-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }
        /* ===== SETUP SCREEN ===== */
        .setup-hero { text-align: center; padding: 48px 32px; }
        .setup-hero .icon { font-size: 56px; margin-bottom: 16px; }
        .setup-hero h2 { font-size: 22px; font-weight: 900; margin-bottom: 6px; }
        .setup-hero p { font-size: 13px; color: var(--text-2); font-weight: 500; }
        .aisle-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 0 16px 20px; }
        .aisle-btn { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 24px 0; text-align: center; font-size: 24px; font-weight: 900; color: var(--text); position: relative; overflow: hidden; transition: all 0.2s; box-shadow: var(--shadow-sm, 0 1px 3px rgba(0,0,0,0.04)); }
        .aisle-btn .aisle-fill { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, rgba(79,125,249,0.12), transparent); transition: height 0.5s; }
        .aisle-btn .aisle-count { position: absolute; top: 6px; right: 8px; font-size: 9px; font-weight: 700; color: var(--text-3); }
        .aisle-btn.assigned { border-color: rgba(79,125,249,0.3); }
        .aisle-btn.assigned::before { content: '●'; position: absolute; top: 6px; left: 8px; font-size: 8px; color: var(--accent); }
        .section-title { padding: 20px 16px 10px; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-3); }
        /* ===== SCHEDULE CARDS ===== */
        .schedule-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); margin: 0 16px 8px; padding: 16px 18px; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow-sm); }
        .schedule-card .sch-left { display: flex; align-items: center; gap: 12px; }
        .schedule-card .sch-icon { font-size: 22px; }
        .schedule-card .sch-label { font-size: 12px; font-weight: 700; color: var(--text); }
        .schedule-card .sch-sub { font-size: 10px; color: var(--text-3); font-weight: 600; }
        .schedule-card .sch-go { color: var(--accent); font-size: 11px; font-weight: 800; }
        .schedule-card.fresh { border-color: rgba(34,211,238,0.25); }
        /* ===== BIN HEADER ===== */
        .bin-header { padding: 14px 16px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .bin-nav { display: flex; gap: 8px; align-items: center; }
        .bin-nav-btn { width: 52px; height: 52px; border-radius: var(--radius-sm); background: var(--surface-2); color: var(--text-3); font-size: 18px; font-weight: 900; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .bin-input { flex: 1; background: var(--surface-2); border: 2px solid var(--border); border-radius: var(--radius-sm); padding: 14px 16px; font-family: 'IBM Plex Mono', monospace; font-size: 20px; font-weight: 700; color: var(--accent); text-transform: uppercase; text-align: center; outline: none; }
        .bin-input:focus { border-color: var(--accent); }
        .bin-progress { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
        .bin-progress-bar { flex: 1; height: 5px; background: var(--surface-3); border-radius: 3px; overflow: hidden; }
        .bin-progress-fill { height: 100%; background: var(--green); border-radius: 3px; transition: width 0.5s; }
        .bin-progress-text { font-size: 11px; font-weight: 700; color: var(--text-3); font-family: 'IBM Plex Mono', monospace; min-width: 50px; text-align: right; }
        /* ===== EXTRA ITEM INPUT ===== */
        .extra-input-area { background: var(--surface); border: 1.5px dashed var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 10px; }
        .extra-input-area h3 { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--cyan); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .extra-field { width: 100%; background: var(--surface-2); border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 14px 16px; font-size: 16px; font-weight: 600; color: var(--text); outline: none; margin-bottom: 8px; }
        .extra-field:focus { border-color: var(--accent); }
        .extra-field::placeholder { color: var(--text-3); }
        /* ===== CYCLE COUNT VERIFICATION ===== */
        .verify-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 10px; }
        .verify-header { text-align: center; margin-bottom: 16px; }
        .verify-header .v-icon { font-size: 40px; margin-bottom: 8px; }
        .verify-header h3 { font-size: 16px; font-weight: 800; }
        .verify-header p { font-size: 12px; color: var(--text-2); font-weight: 500; margin-top: 4px; }
        .verify-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; border-radius: var(--radius-sm); margin-bottom: 4px; }
        .verify-row:nth-child(odd) { background: var(--surface-2); }
        .verify-row .vr-label { font-size: 10px; font-weight: 700; text-transform: uppercase; color: var(--text-3); }
        .verify-row .vr-value { font-family: 'IBM Plex Mono', monospace; font-size: 16px; font-weight: 700; }
        .verify-result { text-align: center; padding: 16px; border-radius: var(--radius-sm); margin-top: 12px; }
        .verify-result.match { background: var(--green-bg); border: 1.5px solid var(--green-border); }
        .verify-result.mismatch { background: var(--red-bg); border: 1.5px solid var(--red-border); }
        .verify-result h4 { font-size: 14px; font-weight: 800; text-transform: uppercase; }
        .verify-result p { font-size: 11px; font-weight: 500; color: var(--text-2); margin-top: 4px; }
        /* ===== MODALS ===== */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 200; display: flex; align-items: flex-end; justify-content: center; padding: 0; }
        .modal-sheet { background: var(--surface); border-radius: var(--radius) var(--radius) 0 0; width: 100%; max-height: 85vh; overflow-y: auto; padding: 24px 20px calc(env(safe-area-inset-bottom, 8px) + 24px); animation: sheet-up 0.35s cubic-bezier(0.16,1,0.3,1); }
        @keyframes sheet-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-handle { width: 36px; height: 4px; background: var(--surface-3); border-radius: 2px; margin: 0 auto 20px; }
        .modal-title { font-size: 18px; font-weight: 800; margin-bottom: 4px; }
        .modal-sub { font-size: 12px; color: var(--text-2); font-weight: 500; margin-bottom: 20px; }
        /* ===== TOAST ===== */
        .toast { position: fixed; top: env(safe-area-inset-top, 12px); left: 50%; transform: translateX(-50%) translateY(-120%); z-index: 999; padding: 12px 20px; border-radius: var(--radius); font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); pointer-events: none; opacity: 0; transition: all 0.4s cubic-bezier(0.16,1,0.3,1); }
        .toast.show { transform: translateX(-50%) translateY(12px); opacity: 1; }
        .toast.green { background: var(--green); color: white; }
        .toast.red { background: var(--red); color: white; }
        .toast.blue { background: var(--accent); color: white; }
        .toast.amber { background: var(--amber); color: white; }
        /* ===== REPORT VIEW ===== */
        .report-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .report-stat { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 16px; text-align: center; }
        .report-stat .val { font-family: 'IBM Plex Mono', monospace; font-size: 28px; font-weight: 700; }
        .report-stat .label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-3); margin-top: 4px; }
        /* ===== EMPTY STATE ===== */
        .empty-state { text-align: center; padding: 48px 32px; }
        .empty-state .es-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }
        .empty-state p { color: var(--text-3); font-size: 13px; font-weight: 600; }
        /* ===== MISC ===== */
        .divider { height: 1px; background: var(--border); margin: 16px 0; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner { width: 20px; height: 20px; border: 2.5px solid var(--surface-3); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; }
        .tag { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 6px; font-size: 10px; font-weight: 700; }
    </style>
</head>
<body>
<!-- Toast -->
<div id="toast" class="toast green"><span id="toast-text">Saved</span></div>

<!-- ===== SCREEN: SETUP ===== -->
<div id="screen-setup" class="screen active">
    <div class="app-header">
        <h1>Cycle Counter</h1>
        <div class="header-right">
            <button id="refresh-btn" onclick="refreshAll()" style="background:var(--surface-2);color:var(--text-2);padding:8px 12px;border-radius:var(--radius-sm);font-size:11px;font-weight:700;display:flex;align-items:center;gap:5px;">
                <span id="refresh-icon" style="display:inline-block;transition:transform 0.3s;">↻</span> Refresh
            </button>
            <div id="sync-dot" class="sync-dot"></div>
            <button class="name-btn" onclick="showNameModal()">👤 <span id="name-display">Set Name</span></button>
        </div>
    </div>
    <div class="scroll-area">
        <!-- Loading state -->
        <div id="setup-loading" class="setup-hero">
            <div class="icon">📡</div>
            <h2>Connecting...</h2>
            <p>Pulling SAP data from cloud</p>
            <div class="spinner" style="margin: 24px auto 0;"></div>
        </div>
        <!-- Ready state -->
        <div id="setup-ready" style="display:none;">
            <div id="schedule-section">
                <div class="section-title">Today's Counts</div>
                <div id="schedule-list"></div>
            </div>
            <div class="section-title">Select Aisle</div>
            <div class="aisle-grid" id="aisle-grid"></div>
            <!-- Quick product lookup -->
            <div class="section-title">Product Lookup</div>
            <div style="padding: 0 16px 16px; display: flex; gap: 8px;">
                <input type="text" id="product-lookup-input" placeholder="Enter Product #" class="extra-field mono" style="margin: 0; flex: 1;">
                <button onclick="startProductCycle(document.getElementById('product-lookup-input').value.trim())" class="primary-btn blue" style="width: auto; padding: 14px 24px; font-size: 12px; min-height: 50px;">Go</button>
            </div>
            <!-- Stats -->
            <div style="padding: 0 16px 20px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;">
                <div class="report-stat"><div id="stat-loaded" class="val" style="font-size:20px">0</div><div class="label">SAP Items</div></div>
                <div class="report-stat"><div id="stat-bins" class="val" style="font-size:20px">0</div><div class="label">Bins</div></div>
                <div class="report-stat"><div id="stat-done" class="val" style="font-size:20px; color:var(--green)">0</div><div class="label">Done</div></div>
            </div>
        </div>
        <!-- Offline fallback -->
        <div id="setup-offline" style="display:none;" class="setup-hero">
            <div class="icon">📵</div>
            <h2>No Connection</h2>
            <p>Cannot reach cloud. Upload a local SAP file or retry.</p>
            <div style="margin-top: 24px; display: flex; flex-direction: column; gap: 12px; align-items: center;">
                <button onclick="pullCloudData()" class="primary-btn blue" style="width: auto; padding: 14px 32px;">↻ Retry</button>
                <input type="file" id="local-file-input" accept=".xlsx,.xls,.csv" class="hidden" style="display:none" onchange="handleLocalFile(event)">
                <button onclick="document.getElementById('local-file-input').click()" class="secondary-btn" style="padding: 12px 24px;">Upload Local File</button>
            </div>
        </div>
    </div>
    <!-- Nav -->
    <div class="bottom-bar" style="display:flex; gap:8px;">
        <button onclick="switchScreen('setup')" class="secondary-btn active" style="flex:1">Count</button>
        <button onclick="switchScreen('report')" class="secondary-btn" style="flex:1">Report</button>
    </div>
</div>

<!-- All other screens (count, product-cc, verify, report) and modals remain unchanged -->
<!-- (The full original code for screens, modals, and the entire script is preserved below) -->

<!-- ===== SCREEN: COUNTING ===== -->
<div id="screen-count" class="screen">
    <!-- ... (unchanged - full original content) ... -->
    <div class="app-header">
        <div style="display:flex;align-items:center;gap:10px;">
            <button onclick="leaveAisle()" style="background:var(--surface-2);color:var(--text-2);padding:8px 12px;border-radius:var(--radius-sm);font-size:11px;font-weight:700;">← Back</button>
            <h1 id="count-title">Counting</h1>
        </div>
        <div class="header-right">
            <div id="sync-dot-2" class="sync-dot"></div>
