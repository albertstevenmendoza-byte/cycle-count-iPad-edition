<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAP PARTY | Audit World</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root { --m-red: #e52521; --m-blue: #049cd8; --m-yellow: #fbd000; --m-green: #43b047; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .retro-font { font-family: 'Press Start 2P', cursive; }
        
        /* Integrity Styles */
        input[type="number"], input[type="text"] { font-size: 16px !important; }
        .card-verified { border: 4px solid var(--m-green); background-color: #f0fdf4; }
        .card-missing { border: 4px solid var(--m-red); background-color: #fef2f2; opacity: 0.8; }
        .card-extra { border: 4px solid #a855f7; background-color: #f5f3ff; }
        .card-error { border: 4px solid var(--m-red) !important; animation: shake 0.2s ease-in-out 0s 2; }
        .nav-active { background-color: var(--m-yellow); color: black; border: 3px solid black; transform: translateY(-2px); }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(5px); } 75% { transform: translateX(-5px); } }
        
        /* Game Visuals */
        .bg-pattern { background-color: #5c94fc; background-image: radial-gradient(#ffffff 10%, transparent 10%); background-size: 40px 40px; }
        .game-card { box-shadow: 6px 6px 0px rgba(0,0,0,0.2); border: 4px solid #000; }
        .board-space { position: relative; transition: all 0.2s; border: 4px solid #000; box-shadow: 4px 4px 0px rgba(0,0,0,0.3); }
        .board-space:active { transform: scale(0.9); }
        .char-token { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); z-index: 10; filter: drop-shadow(2px 2px 0px black); }
        @keyframes star-jump { 0% { transform: scale(0.5) rotate(0deg); opacity: 0; } 50% { transform: scale(1.2) rotate(180deg); } 100% { transform: scale(1) rotate(360deg); opacity: 1; } }
        .star-anim { animation: star-jump 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-pattern text-slate-900 flex flex-col h-screen overflow-hidden">

    <!-- Header HUD -->
    <header class="bg-black text-white p-3 shadow-lg shrink-0 border-b-4 border-yellow-400">
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div id="hud-char" class="w-10 h-10 bg-white rounded border-2 border-white flex items-center justify-center overflow-hidden"></div>
                <div>
                    <h1 class="retro-font text-[10px] tracking-tighter">SAP PARTY</h1>
                    <div id="data-status" class="text-[7px] text-yellow-400 font-bold uppercase mt-1">OFFLINE</div>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <div class="flex items-center bg-slate-800 px-2 py-1 rounded-full border border-slate-600">
                    <span class="mr-1">⭐</span>
                    <span id="star-count" class="retro-font text-[10px]">0</span>
                </div>
                <button onclick="clearAllData()" class="bg-red-600 border-2 border-white px-2 py-1 text-[7px] retro-font">RESET</button>
            </div>
        </div>
    </header>

    <!-- Nav Tabs -->
    <nav class="bg-blue-800 border-b-4 border-black flex p-1 no-print shrink-0 gap-1">
        <button id="nav-audit" onclick="switchView('audit')" class="flex-1 py-3 text-[8px] retro-font uppercase nav-active rounded-t-lg">Audit</button>
        <button id="nav-report" onclick="switchView('report')" class="flex-1 py-3 text-[8px] retro-font uppercase text-white rounded-t-lg">Report</button>
    </nav>

    <!-- AUDIT VIEW -->
    <main id="view-audit" class="flex-1 flex flex-col overflow-hidden relative">
        <!-- STARTUP OVERLAY -->
        <div id="setup-screen" class="absolute inset-0 bg-blue-500 z-40 flex flex-col p-6 overflow-y-auto">
            <div id="char-selection" class="mb-8">
                <h2 class="retro-font text-white text-center text-[10px] mb-6">SELECT YOUR AUDITOR</h2>
                <div class="grid grid-cols-4 gap-2 max-w-sm mx-auto">
                    <button onclick="selectChar('mario')" class="bg-white p-2 rounded-xl border-4 border-black">
                        <svg viewBox="0 0 16 16" class="w-full h-auto"><path fill="#f00" d="M4 0h8v2H4zM2 2h12v2H2zM0 4h16v3H0z"/><path fill="#fca" d="M3 7h10v4H3zM5 11h6v1H5z"/><path fill="#00f" d="M4 12h8v3H4z"/><circle cx="6" cy="9" r="1"/><circle cx="10" cy="9" r="1"/></svg>
                    </button>
                    <button onclick="selectChar('luigi')" class="bg-white p-2 rounded-xl border-4 border-black">
                        <svg viewBox="0 0 16 16" class="w-full h-auto"><path fill="#0a0" d="M4 0h8v2H4zM2 2h12v2H2zM0 4h16v3H0z"/><path fill="#fca" d="M3 7h10v4H3zM5 11h6v1H5z"/><path fill="#00f" d="M4 12h8v3H4z"/><circle cx="6" cy="9" r="1"/><circle cx="10" cy="9" r="1"/></svg>
                    </button>
                    <button onclick="selectChar('peach')" class="bg-white p-2 rounded-xl border-4 border-black">
                        <svg viewBox="0 0 16 16" class="w-full h-auto"><path fill="#f9c" d="M4 0h8v7H4z"/><path fill="#ff0" d="M4 0l2 2 2-2 2 2 2-2v2H4z"/><path fill="#fca" d="M5 3h6v4H5z"/><path fill="#f9c" d="M2 7h12v9H2z"/><circle cx="8" cy="5" r="1" fill="#0cf"/></svg>
                    </button>
                    <button onclick="selectChar('toad')" class="bg-white p-2 rounded-xl border-4 border-black">
                        <svg viewBox="0 0 16 16" class="w-full h-auto"><path fill="#fff" d="M3 0h10v7H3z"/><circle fill="red" cx="8" cy="2" r="2"/><circle fill="red" cx="4" cy="4" r="2"/><circle fill="red" cx="12" cy="4" r="2"/><path fill="#fca" d="M5 7h6v4H5z"/><path fill="#fff" d="M4 11h8v5H4z"/></svg>
                    </button>
                </div>
            </div>

            <div id="upload-prompt" class="flex-1 flex flex-col items-center justify-center text-center">
                <h2 class="retro-font text-xs text-white mb-6">LOAD SAP DATA</h2>
                <input type="file" id="sap-upload-main" accept=".xlsx, .xls, .csv" class="hidden" onchange="handleFileUpload(event)">
                <label for="sap-upload-main" class="w-full max-w-xs bg-green-500 text-white py-5 rounded-2xl retro-font text-[10px] border-4 border-black shadow-xl cursor-pointer block">CHOOSE DISK</label>
            </div>

            <div id="row-selection" class="hidden">
                <h2 class="retro-font text-white text-[10px] mb-6 text-center italic">SELECT A SPACE</h2>
                <div class="grid grid-cols-4 gap-3" id="row-grid"></div>
            </div>
        </div>

        <!-- HUD INPUT -->
        <div class="p-3 bg-white border-b-4 border-black shrink-0">
            <div class="flex gap-2">
                <button onclick="stepBin(-1)" class="bg-blue-500 text-white px-4 rounded-xl border-2 border-black font-black">◀</button>
                <input type="text" id="bin-input" placeholder="SCAN BIN..." autocomplete="off"
                       class="flex-1 p-4 bg-slate-100 border-2 border-black rounded-xl text-xl font-black text-blue-700 uppercase outline-none"
                       oninput="suggestBins(this.value)">
                <button onclick="stepBin(1)" class="bg-blue-500 text-white px-4 rounded-xl border-2 border-black font-black">▶</button>
            </div>
            <div id="bin-suggestions" class="flex gap-2 mt-3 overflow-x-auto no-scrollbar pb-1"></div>
        </div>

        <!-- LIST AREA -->
        <div id="audit-list" class="flex-1 overflow-y-auto p-3 space-y-4 pb-56"></div>

        <!-- STICKY FOOTER -->
        <div class="fixed bottom-0 left-0 right-0 bg-black p-3 shadow-2xl no-print z-50 border-t-4 border-yellow-400">
            <div class="flex gap-2 mb-3">
                <button onclick="toggleAddForm()" class="flex-1 bg-orange-500 text-white py-3 rounded-xl retro-font text-[8px] border-2 border-white">+ FOUND ITEM</button>
                <button onclick="finalizeBin()" class="flex-1 bg-slate-700 text-slate-300 py-3 rounded-xl retro-font text-[8px] border-2 border-slate-500">MARK EMPTY</button>
            </div>
            <button onclick="finalizeBin()" class="w-full bg-green-500 text-white py-4 rounded-xl retro-font text-[10px] border-4 border-white shadow-lg active:scale-95">FINALIZE BIN</button>
        </div>
    </main>

    <!-- STAR MODAL -->
    <div id="row-end-modal" class="hidden fixed inset-0 bg-blue-600/95 z-[70] p-6 flex items-center justify-center">
        <div class="text-center">
            <div class="text-8xl mb-6 star-anim">⭐</div>
            <h2 class="retro-font text-white text-xl mb-4">AISLE CLEAR!</h2>
            <p id="row-end-text" class="text-yellow-300 retro-font text-[8px] mb-8"></p>
            <div class="space-y-4">
                <button id="btn-next-row" class="w-full bg-yellow-400 text-black py-4 rounded-2xl retro-font text-[8px] border-4 border-black">NEXT AISLE</button>
                <button onclick="openRowSelector()" class="w-full bg-white text-blue-600 py-4 rounded-2xl retro-font text-[8px] border-4 border-black">GO TO MAP</button>
            </div>
        </div>
    </div>

    <!-- REPORT VIEW -->
    <main id="view-report" class="hidden flex-1 flex flex-col overflow-hidden p-3 space-y-3">
        <div class="flex gap-1 overflow-x-auto pb-2 no-print shrink-0 no-scrollbar">
            <button onclick="filterReport('move')" id="f-move" class="whitespace-nowrap px-4 py-2 rounded-full text-[8px] retro-font bg-white border-2 border-black">MOVES</button>
            <button onclick="filterReport('adj')" id="f-adj" class="whitespace-nowrap px-4 py-2 rounded-full text-[8px] retro-font bg-white border-2 border-black">ADJS</button>
            <button onclick="filterReport('inactive')" id="f-inactive" class="whitespace-nowrap px-4 py-2 rounded-full text-[8px] retro-font bg-white border-2 border-black">EXTRAS</button>
            <button onclick="filterReport('missing')" id="f-missing" class="whitespace-nowrap px-4 py-2 rounded-full text-[8px] retro-font bg-white border-2 border-black">MISSING</button>
        </div>
        <div class="flex-1 overflow-y-auto space-y-3" id="report-body"></div>
        <div class="bg-white p-4 rounded-2xl border-4 border-black no-print space-y-3">
            <div class="flex items-center gap-2">
                <input type="text" id="email-user" placeholder="Novus Username" class="flex-1 p-3 border-2 border-black rounded-xl font-bold">
                <span class="text-[10px] font-bold">@novusfoods.com</span>
            </div>
            <button onclick="sendEmailReport()" class="w-full bg-blue-600 text-white py-4 rounded-xl retro-font text-[8px] border-4 border-black">SEND RESULTS</button>
        </div>
    </main>

    <!-- MODAL: ADD EXTRA ITEM -->
    <div id="add-item-modal" class="hidden fixed inset-0 bg-black/80 z-[60] p-4 flex items-center justify-center">
        <div class="bg-white w-full max-w-sm rounded-3xl border-4 border-black p-6 space-y-4">
            <h2 class="retro-font text-[10px]">ADD PHYSICAL ITEM</h2>
            <div class="space-y-3">
                <input type="text" id="add-hu" placeholder="HU Number" class="w-full p-4 bg-slate-100 rounded-xl font-bold border-2 border-black" oninput="autoLookupExtra(this)">
                <input type="text" id="add-prod" placeholder="Product ID" class="w-full p-4 bg-slate-100 rounded-xl font-bold border-2 border-black">
                <input type="number" id="add-qty" placeholder="Count" class="w-full p-5 bg-yellow-50 rounded-xl font-black text-center text-2xl border-2 border-black outline-none">
            </div>
            <div class="flex gap-3">
                <button onclick="toggleAddForm()" class="flex-1 retro-font text-[8px]">CANCEL</button>
                <button onclick="submitExtra()" class="flex-[2] bg-orange-500 text-white py-4 rounded-xl retro-font text-[8px] border-2 border-black">ADD ITEM</button>
            </div>
        </div>
    </div>

    <script>
        // --- DATA STATE (Your Original Integrity) ---
        let sapMasterData = JSON.parse(localStorage.getItem('sapMasterData')) || [];
        let auditLog = JSON.parse(localStorage.getItem('auditLog')) || []; 
        let currentBinItems = JSON.parse(localStorage.getItem('currentBinItems')) || [];
        let currentActiveBin = localStorage.getItem('currentActiveBin') || "";
        let binsAudited = new Set(JSON.parse(localStorage.getItem('binsAudited')) || []);
        
        // --- GAME STATE ---
        let stars = parseInt(localStorage.getItem('stars')) || 0;
        let selectedCharacter = localStorage.getItem('selectedCharacter') || 'mario';

        const charSVGs = {
            mario: `<svg viewBox="0 0 16 16"><path fill="#f00" d="M4 0h8v2H4zM2 2h12v2H2zM0 4h16v3H0z"/><path fill="#fca" d="M3 7h10v4H3zM5 11h6v1H5z"/><path fill="#00f" d="M4 12h8v3H4z"/><circle cx="6" cy="9" r="1"/><circle cx="10" cy="9" r="1"/></svg>`,
            luigi: `<svg viewBox="0 0 16 16"><path fill="#0a0" d="M4 0h8v2H4zM2 2h12v2H2zM0 4h16v3H0z"/><path fill="#fca" d="M3 7h10v4H3zM5 11h6v1H5z"/><path fill="#00f" d="M4 12h8v3H4z"/><circle cx="6" cy="9" r="1"/><circle cx="10" cy="9" r="1"/></svg>`,
            peach: `<svg viewBox="0 0 16 16"><path fill="#f9c" d="M4 0h8v7H4z"/><path fill="#ff0" d="M4 0l2 2 2-2 2 2 2-2v2H4z"/><path fill="#fca" d="M5 3h6v4H5z"/><path fill="#f9c" d="M2 7h12v9H2z"/><circle cx="8" cy="5" r="1" fill="#0cf"/></svg>`,
            toad: `<svg viewBox="0 0 16 16"><path fill="#fff" d="M3 0h10v7H3z"/><circle fill="red" cx="8" cy="2" r="2"/><circle fill="red" cx="4" cy="4" r="2"/><circle fill="red" cx="12" cy="4" r="2"/><path fill="#fca" d="M5 7h6v4H5z"/><path fill="#fff" d="M4 11h8v5H4z"/></svg>`
        };

        function saveSession() {
            localStorage.setItem('sapMasterData', JSON.stringify(sapMasterData));
            localStorage.setItem('auditLog', JSON.stringify(auditLog));
            localStorage.setItem('currentBinItems', JSON.stringify(currentBinItems));
            localStorage.setItem('currentActiveBin', currentActiveBin);
            localStorage.setItem('binsAudited', JSON.stringify(Array.from(binsAudited)));
            localStorage.setItem('stars', stars);
            localStorage.setItem('selectedCharacter', selectedCharacter);
            updateHUD();
        }

        function updateHUD() {
            document.getElementById('star-count').innerText = stars;
            document.getElementById('hud-char').innerHTML = charSVGs[selectedCharacter];
        }

        function selectChar(key) {
            selectedCharacter = key;
            saveSession();
            initSetupGrid();
        }

        window.onload = () => {
            initSetupGrid();
            updateHUD();
            if (sapMasterData.length > 0) unlockAudit();
            if (currentActiveBin) {
                document.getElementById('setup-screen').classList.add('hidden');
                document.getElementById('bin-input').value = currentActiveBin;
                renderAuditList();
                suggestBins("");
            }
        };

        function initSetupGrid() {
            const grid = document.getElementById('row-grid');
            grid.innerHTML = "";
            "ABCDEFGHIJKLMNOP".split("").forEach(row => {
                const isCurrent = currentActiveBin && currentActiveBin.charAt(1) === row;
                const btn = document.createElement('button');
                btn.className = "board-space bg-white p-4 rounded-2xl retro-font text-lg active:bg-yellow-400";
                btn.innerHTML = `
                    ${isCurrent ? `<div class="char-token w-8 h-8">${charSVGs[selectedCharacter]}</div>` : ''}
                    ${row}
                `;
                btn.onclick = () => startAuditAtRow(row);
                grid.appendChild(btn);
            });
        }

        function unlockAudit() {
            document.getElementById('upload-prompt').classList.add('hidden');
            document.getElementById('row-selection').classList.remove('hidden');
            document.getElementById('data-status').innerText = `ONLINE: ${sapMasterData.length} SKU`;
            document.getElementById('data-status').className = "text-[7px] text-green-400 font-bold uppercase mt-1";
        }

        function startAuditAtRow(rowLetter) {
            document.getElementById('setup-screen').classList.add('hidden');
            selectBin(`W${rowLetter}00A`);
        }

        function openRowSelector() {
            document.getElementById('row-end-modal').classList.add('hidden');
            document.getElementById('setup-screen').classList.remove('hidden');
            document.getElementById('row-selection').classList.remove('hidden');
            initSetupGrid();
        }

        function clearAllData() { 
            if (confirm("⚠️ WARNING: This will permanently delete all SAP data and progress. Reset?")) { 
                localStorage.clear(); location.reload(); 
            } 
        }

        // --- BIN NAVIGATION (Original Integrity) ---
        function getNextPhysicalBin(current) {
            if (!current) return null;
            let row = current.charAt(1);
            if (current.endsWith("100")) {
                let nextRow = String.fromCharCode(row.charCodeAt(0) + 1);
                return nextRow > 'P' ? null : `W${nextRow}00A`;
            }
            let bay = parseInt(current.substring(2, 4));
            let level = current.charAt(4);
            if (level === 'A') level = 'B';
            else if (level === 'B') level = 'C';
            else {
                if (bay >= 39) return `W${row}100`;
                else { level = 'A'; bay++; }
            }
            return `W${row}${bay.toString().padStart(2, '0')}${level}`;
        }

        function getPrevPhysicalBin(current) {
            if (!current) return null;
            let row = current.charAt(1);
            if (current.endsWith("100")) return `W${row}39C`;
            let bay = parseInt(current.substring(2, 4));
            let level = current.charAt(4);
            if (level === 'C') level = 'B';
            else if (level === 'B') level = 'A';
            else {
                if (bay === 0) return null;
                level = 'C'; bay--;
            }
            return `W${row}${bay.toString().padStart(2, '0')}${level}`;
        }

        function stepBin(dir) {
            const next = dir > 0 ? getNextPhysicalBin(currentActiveBin) : getPrevPhysicalBin(currentActiveBin);
            if (next) selectBin(next);
        }

        function suggestBins(val) {
            const container = document.getElementById('bin-suggestions');
            container.innerHTML = "";
            if (currentActiveBin) {
                const bayPrefix = currentActiveBin.substring(0, 4);
                ['A', 'B', 'C'].forEach(lvl => {
                    const btn = document.createElement('button');
                    btn.className = `px-6 py-2 rounded-lg retro-font text-[8px] border-2 border-black shrink-0 ${currentActiveBin.endsWith(lvl) && !currentActiveBin.endsWith("100") ? 'bg-yellow-400 text-black' : 'bg-white text-blue-600'}`;
                    btn.innerText = lvl;
                    btn.onclick = () => selectBin(bayPrefix + lvl);
                    container.appendChild(btn);
                });
                const floorBtn = document.createElement('button');
                floorBtn.className = `px-6 py-2 rounded-lg retro-font text-[8px] border-2 border-black shrink-0 ${currentActiveBin.endsWith("100") ? 'bg-orange-500 text-white' : 'bg-white text-orange-600'}`;
                floorBtn.innerText = "100";
                floorBtn.onclick = () => selectBin(`W${currentActiveBin.charAt(1)}100`);
                container.appendChild(floorBtn);
            }
        }

        function selectBin(binName) {
            document.getElementById('bin-input').value = binName;
            loadBinData(binName);
            suggestBins("");
        }

        function loadBinData(binVal) {
            currentActiveBin = binVal.toUpperCase();
            const expected = sapMasterData.filter(i => i.sapBin === currentActiveBin);
            currentBinItems = expected.map(i => ({ 
                ...i, verified: false, isMissing: false, countQty: 0, isExtra: false, scannedBin: currentActiveBin 
            }));
            saveSession(); renderAuditList();
        }

        function finalizeBin() {
            if(!currentActiveBin) return;
            let errors = false;
            currentBinItems.forEach((item, index) => {
                const card = document.getElementById(`card-${index}`);
                if ((item.verified && item.countQty <= 0) || (!item.verified && !item.isMissing)) {
                    card.classList.add('card-error'); errors = true;
                }
            });
            if (errors) return;
            auditLog.push(...currentBinItems);
            binsAudited.add(currentActiveBin);
            
            const isFloorBin = currentActiveBin.endsWith("100");
            const nextBin = getNextPhysicalBin(currentActiveBin);

            if (isFloorBin) {
                stars++;
                saveSession();
                showRowEndPrompt(currentActiveBin.charAt(1), nextBin);
            } else if (nextBin) {
                selectBin(nextBin);
            }
            saveSession(); renderAuditList(); window.scrollTo(0,0);
        }

        function showRowEndPrompt(finishedRow, nextBin) {
            const modal = document.getElementById('row-end-modal');
            const text = document.getElementById('row-end-text');
            const nextBtn = document.getElementById('btn-next-row');
            text.innerText = `YOU CLEARED AISLE ${finishedRow}!`;
            if (nextBin) {
                nextBtn.innerText = `GO TO AISLE ${nextBin.charAt(1)}`;
                nextBtn.onclick = () => { modal.classList.add('hidden'); selectBin(nextBin); };
                nextBtn.classList.remove('hidden');
            } else { nextBtn.classList.add('hidden'); }
            modal.classList.remove('hidden');
        }

        function quickConfirm(idx) {
            currentBinItems[idx].countQty = currentBinItems[idx].sapQty;
            currentBinItems[idx].verified = true;
            currentBinItems[idx].isMissing = false;
            saveSession(); renderAuditList();
        }

        function adjustQty(idx, delta) {
            let current = currentBinItems[idx].countQty || 0;
            currentBinItems[idx].countQty = Math.max(0, current + delta);
            currentBinItems[idx].verified = (currentBinItems[idx].countQty > 0);
            if (currentBinItems[idx].verified) currentBinItems[idx].isMissing = false;
            saveSession(); renderAuditList();
        }

        function renderAuditList() {
            const container = document.getElementById('audit-list');
            container.innerHTML = "";
            if (currentBinItems.length === 0 && currentActiveBin !== "") {
                container.innerHTML = `<div class="p-10 text-center text-white retro-font text-[8px]">BIN EMPTY IN SAP</div>`;
            }
            currentBinItems.forEach((item, index) => {
                const card = document.createElement('div');
                card.id = `card-${index}`;
                card.className = `p-4 rounded-2xl game-card bg-white transition-all ${item.verified ? 'card-verified' : (item.isMissing ? 'card-missing' : (item.isExtra ? 'card-extra' : ''))}`;
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-3">
                        <div class="flex-1">
                            <span class="inline-block px-2 py-0.5 bg-black text-white font-mono text-[10px] rounded mb-2">HU: ${item.hu}</span>
                            <h3 class="text-sm font-black text-slate-800 leading-tight">${item.product}</h3>
                            <p class="text-[10px] text-blue-600 font-bold uppercase mt-0.5 leading-tight">${item.desc}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[8px] font-black text-slate-400 uppercase">SAP Qty</p>
                            <p class="text-lg font-black text-slate-700">${item.isExtra ? '--' : item.sapQty} <span class="text-[10px]">${item.uom}</span></p>
                        </div>
                    </div>
                    <div class="flex flex-col gap-3">
                        <div class="flex gap-2 items-center">
                            ${!item.isExtra ? `<button onclick="quickConfirm(${index})" class="flex-[2] py-4 bg-green-500 text-white rounded-xl font-black border-2 border-black text-xs uppercase shadow-md active:scale-95">ALL ${item.sapQty}</button>` : ''}
                            <button onclick="toggleMissing(${index})" class="flex-1 py-4 rounded-xl border-2 border-black font-black text-[10px] uppercase ${item.isMissing ? 'bg-red-600 text-white' : 'bg-white text-slate-400'}">Missing</button>
                        </div>
                        <div class="flex items-center gap-2 bg-slate-100 p-1 rounded-2xl border-2 border-black">
                            <button onclick="adjustQty(${index}, -1)" class="w-12 h-12 flex items-center justify-center bg-white rounded-xl shadow-sm text-2xl font-black">－</button>
                            <input type="number" inputmode="decimal" value="${item.countQty || ''}" oninput="updateCount(${index}, this.value)" placeholder="QTY" class="flex-1 bg-transparent text-center font-black text-xl text-blue-700 outline-none border-none">
                            <button onclick="adjustQty(${index}, 1)" class="w-12 h-12 flex items-center justify-center bg-white rounded-xl shadow-sm text-2xl font-black text-blue-600">＋</button>
                        </div>
                    </div>`;
                container.appendChild(card);
            });
        }

        function toggleMissing(idx) { 
            currentBinItems[idx].isMissing = !currentBinItems[idx].isMissing; 
            if (currentBinItems[idx].isMissing) { currentBinItems[idx].verified = false; currentBinItems[idx].countQty = 0; } 
            saveSession(); renderAuditList(); 
        }

        function updateCount(idx, val) { 
            currentBinItems[idx].countQty = parseFloat(val) || 0; 
            currentBinItems[idx].verified = (currentBinItems[idx].countQty > 0);
            if(currentBinItems[idx].countQty > 0) currentBinItems[idx].isMissing = false; 
            saveSession();
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                const workbook = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
                const raw = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                sapMasterData = raw.map(row => ({
                    sapBin: String(row['Storage Bin'] || row['Storage bin'] || "").trim().toUpperCase(),
                    hu: String(row['Handling Unit'] || row['HU'] || "").trim(),
                    product: String(row['Product'] || ""),
                    desc: row['Product Short Description'] || row['Product short description'] || "",
                    uom: row['Base Unit of Measure'] || "EA",
                    sapQty: parseFloat(row['Quantity']) || 0
                }));
                saveSession(); unlockAudit();
            };
            reader.readAsArrayBuffer(file);
        }

        function toggleAddForm() { document.getElementById('add-item-modal').classList.toggle('hidden'); }

        function submitExtra() {
            const hu = document.getElementById('add-hu').value.trim();
            const prod = document.getElementById('add-prod').value.trim();
            const qty = parseFloat(document.getElementById('add-qty').value) || 0;
            if(!currentActiveBin || !hu || !prod || qty <= 0) return alert("Fill all fields.");
            const sapMatch = sapMasterData.find(i => i.hu === hu);
            currentBinItems.push({ 
                hu, product: prod, sapQty: sapMatch ? sapMatch.sapQty : 0, 
                sapBin: sapMatch ? sapMatch.sapBin : null, scannedBin: currentActiveBin, 
                countQty: qty, verified: true, isMissing: false, isExtra: !sapMatch, 
                desc: sapMatch ? sapMatch.desc : "GHOST ITEM", uom: sapMatch ? sapMatch.uom : "EA" 
            });
            toggleAddForm(); saveSession(); renderAuditList();
        }

        function switchView(view) {
            document.getElementById('view-audit').classList.toggle('hidden', view !== 'audit');
            document.getElementById('view-report').classList.toggle('hidden', view !== 'report');
            document.getElementById('nav-audit').classList.toggle('nav-active', view === 'audit');
            document.getElementById('nav-report').classList.toggle('nav-active', view === 'report');
            if(view === 'report') filterReport('move');
        }

        // --- RECONCILIATION LOGIC (Original Integrity) ---
        function getReconciledData() {
            const allRecords = [...auditLog, ...currentBinItems];
            const huMap = {};
            allRecords.forEach(rec => {
                if (!huMap[rec.hu]) { huMap[rec.hu] = { ...rec }; } 
                else {
                    let existing = huMap[rec.hu];
                    if ((rec.verified || rec.isExtra) && existing.isMissing) {
                        existing.scannedBin = rec.scannedBin;
                        existing.countQty = rec.countQty;
                        existing.verified = true;
                        existing.isMissing = false;
                        if (!existing.sapBin && rec.sapBin) existing.sapBin = rec.sapBin;
                    }
                }
            });
            return Object.values(huMap);
        }

        function filterReport(type) {
            const container = document.getElementById('report-body');
            container.innerHTML = "";
            ['move', 'adj', 'inactive', 'missing'].forEach(id => {
                const btn = document.getElementById('f-' + id);
                btn.className = `whitespace-nowrap px-4 py-2 rounded-full text-[8px] retro-font border-2 border-black ${id === type ? 'bg-yellow-400 text-black' : 'bg-white text-slate-400'}`;
            });

            const reconciled = getReconciledData();
            let filtered = [];
            if (type === 'move') filtered = reconciled.filter(i => i.sapBin && i.sapBin !== i.scannedBin && i.verified);
            else if (type === 'adj') filtered = reconciled.filter(i => i.verified && i.countQty !== i.sapQty);
            else if (type === 'missing') filtered = reconciled.filter(i => i.isMissing);
            else if (type === 'inactive') filtered = reconciled.filter(i => i.isExtra && !i.sapBin);
            
            if (filtered.length === 0) {
                container.innerHTML = `<div class="p-10 text-center text-white retro-font text-[8px]">CLEAR</div>`;
                return;
            }

            filtered.forEach(i => {
                const div = document.createElement('div');
                div.className = "p-4 bg-white rounded-2xl border-4 border-black space-y-2";
                div.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="retro-font text-[7px] mb-1">HU: ${i.hu}</p>
                            <h4 class="text-xs font-black">${i.product}</h4>
                        </div>
                        <p class="text-xs font-black">${i.countQty} ${i.uom}</p>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function sendEmailReport() {
            const user = document.getElementById('email-user').value.trim();
            if (!user) return alert("Enter username.");
            const reconciled = getReconciledData();
            let body = `SAP PARTY AUDIT REPORT - STARS: ${stars}\n\n`;
            reconciled.forEach(i => {
                body += `HU: ${i.hu} | SAP: ${i.sapBin || 'N/A'} | FOUND: ${i.scannedBin} | QTY: ${i.countQty}\n`;
            });
            window.location.href = `mailto:${user}@novusfoods.com?subject=Warehouse Audit Results&body=${encodeURIComponent(body)}`;
        }

        function autoLookupExtra(input) {
            const hu = input.value.trim();
            if (hu.length >= 8) {
                const match = sapMasterData.find(i => i.hu === hu);
                if (match) { 
                    document.getElementById('add-prod').value = match.product; 
                    document.getElementById('add-qty').focus(); 
                }
            }
        }
    </script>
</body>
</html>
