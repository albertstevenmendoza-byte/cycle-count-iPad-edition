<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAP PARTY | Audit Quest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root { --m-red: #e52521; --m-blue: #049cd8; --m-yellow: #fbd000; --m-green: #43b047; }
        body { font-family: 'Segoe UI', sans-serif; background: #5c94fc; overflow: hidden; }
        .retro-font { font-family: 'Press Start 2P', cursive; }
        
        /* INTEGRITY STYLES */
        input[type="number"], input[type="text"] { font-size: 16px !important; }
        .card-verified { border: 6px solid var(--m-green) !important; background-color: #f0fdf4; }
        .card-missing { border: 6px solid var(--m-red) !important; background-color: #fef2f2; opacity: 0.8; }
        .card-extra { border: 6px solid #a855f7 !important; background-color: #f5f3ff; }
        .card-error { border: 6px solid var(--m-red) !important; animation: shake 0.2s 2; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(5px); } 75% { transform: translateX(-5px); } }
        
        /* 3D UI */
        .btn-3d { position: relative; transition: all 0.1s; border: 3px solid #000; box-shadow: 0 6px 0 #000; top: 0; }
        .btn-3d:active { top: 4px; box-shadow: 0 2px 0 #000; }
        .game-card { border: 4px solid #000; box-shadow: 8px 8px 0px rgba(0,0,0,0.1); }

        /* WORLD MAP & TRACKER */
        .world-map { background: #000; border-bottom: 4px solid var(--m-yellow); display: flex; overflow-x: auto; padding: 12px; gap: 15px; scrollbar-width: none; }
        .aisle-node { min-width: 35px; height: 35px; background: #333; border: 2px solid #666; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 8px; border-radius: 4px; }
        .aisle-active { background: var(--m-blue); border-color: #fff; box-shadow: 0 0 15px var(--m-blue); }

        .bay-track { height: 12px; background: rgba(0,0,0,0.2); border: 2px solid #000; border-radius: 10px; position: relative; margin: 25px 0; }
        .track-char { position: absolute; top: -32px; left: 0%; transition: left 0.5s ease-in-out; }
        
        .nav-active { background-color: var(--m-yellow); color: black; border: 4px solid black; transform: translateY(-4px); box-shadow: 0 4px 0 #000; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <!-- HUD -->
    <header class="shrink-0 z-50">
        <div class="bg-black p-2 flex justify-between items-center border-b-2 border-slate-800">
            <div class="flex gap-4">
                <div><p class="text-[6px] retro-font text-slate-500 mb-1">AUDITOR</p><p id="hud-name" class="text-[8px] retro-font text-white uppercase">---</p></div>
                <div><p class="text-[6px] retro-font text-slate-500 mb-1">STARS</p><p class="text-[8px] retro-font text-yellow-400">⭐x<span id="star-count">0</span></p></div>
            </div>
            <div id="data-status" class="text-[6px] retro-font text-slate-500">OFFLINE</div>
        </div>
        <div id="world-map" class="world-map no-scrollbar"></div>
    </header>

    <!-- Navigation -->
    <nav class="bg-blue-900 flex p-1 gap-1 border-b-4 border-black shrink-0">
        <button id="nav-audit" onclick="switchView('audit')" class="flex-1 py-3 text-[8px] retro-font uppercase nav-active">AUDIT WORLD</button>
        <button id="nav-report" onclick="switchView('report')" class="flex-1 py-3 text-[8px] retro-font uppercase text-white">SCOREBOARD</button>
    </nav>

    <!-- AUDIT VIEW -->
    <main id="view-audit" class="flex-1 flex flex-col overflow-hidden relative">
        
        <!-- STARTUP SCREEN -->
        <div id="setup-screen" class="absolute inset-0 bg-blue-500 z-40 flex flex-col p-6 overflow-y-auto">
            <div id="char-selection" class="text-center">
                <h2 class="retro-font text-white text-[10px] mb-10">SELECT CHARACTER</h2>
                <div class="grid grid-cols-2 gap-6 max-w-xs mx-auto">
                    <button onclick="selectChar('mario')" class="btn-3d bg-white p-4 rounded-2xl"><div class="w-12 h-12 mx-auto mb-2" id="svg-mario"></div><p class="retro-font text-[8px]">MARIO</p></button>
                    <button onclick="selectChar('luigi')" class="btn-3d bg-white p-4 rounded-2xl"><div class="w-12 h-12 mx-auto mb-2" id="svg-luigi"></div><p class="retro-font text-[8px]">LUIGI</p></button>
                    <button onclick="selectChar('peach')" class="btn-3d bg-white p-4 rounded-2xl"><div class="w-12 h-12 mx-auto mb-2" id="svg-peach"></div><p class="retro-font text-[8px]">PEACH</p></button>
                    <button onclick="selectChar('toad')" class="btn-3d bg-white p-4 rounded-2xl"><div class="w-12 h-12 mx-auto mb-2" id="svg-toad"></div><p class="retro-font text-[8px]">TOAD</p></button>
                </div>
            </div>
            <div id="upload-prompt" class="hidden mt-12 flex flex-col items-center">
                <h2 class="retro-font text-white text-[10px] mb-6">INSERT SAP DATA DISK</h2>
                <input type="file" id="sap-upload-main" accept=".xlsx, .xls, .csv" class="hidden" onchange="handleFileUpload(event)">
                <label for="sap-upload-main" class="btn-3d bg-green-500 text-white px-10 py-5 rounded-xl retro-font text-[10px] cursor-pointer">LOAD FILE</label>
            </div>
            <div id="row-selection" class="hidden mt-8 grid grid-cols-4 gap-3 max-w-sm mx-auto"></div>
        </div>

        <!-- PROGRESS HUD -->
        <div class="px-6 bg-white border-b-4 border-black">
            <div class="bay-track">
                <div id="track-char" class="track-char w-10 h-10"></div>
            </div>
            <div class="flex justify-between text-[6px] retro-font text-slate-400 pb-2 uppercase">
                <span>Bay 00</span><span id="current-bin-display" class="text-blue-600 font-bold">---</span><span>Bay 39</span>
            </div>
        </div>

        <!-- INPUT AREA -->
        <div class="p-3 bg-slate-100 border-b-4 border-black shrink-0">
            <div class="flex gap-2">
                <button onclick="stepBin(-1)" class="btn-3d bg-blue-500 text-white px-4 rounded-xl font-black">◀</button>
                <input type="text" id="bin-input" placeholder="SCAN BIN..." autocomplete="off"
                       class="flex-1 p-4 bg-white border-2 border-black rounded-xl text-xl font-black text-blue-700 uppercase outline-none"
                       oninput="suggestBins(this.value)">
                <button onclick="stepBin(1)" class="btn-3d bg-blue-500 text-white px-4 rounded-xl font-black">▶</button>
            </div>
            <div id="bin-suggestions" class="flex gap-2 mt-3 overflow-x-auto no-scrollbar pb-1"></div>
        </div>

        <!-- LIST AREA -->
        <div id="audit-list" class="flex-1 overflow-y-auto p-3 space-y-4 pb-56"></div>

        <!-- FOOTER -->
        <div class="fixed bottom-0 left-0 right-0 bg-black p-3 z-50 border-t-4 border-yellow-400">
            <div class="flex gap-2 mb-3">
                <button onclick="toggleAddForm()" class="btn-3d flex-1 bg-orange-500 text-white py-3 rounded-xl retro-font text-[8px]">+ FOUND ITEM</button>
                <button onclick="finalizeBin()" class="btn-3d flex-1 bg-slate-700 text-slate-300 py-3 rounded-xl retro-font text-[8px]">MARK EMPTY</button>
            </div>
            <button onclick="finalizeBin()" class="btn-3d w-full bg-green-500 text-white py-4 rounded-xl retro-font text-[10px]">FINALIZE & NEXT BIN</button>
        </div>
    </main>

    <!-- STAR MODAL -->
    <div id="row-end-modal" class="hidden fixed inset-0 bg-blue-600/95 z-[70] p-6 flex items-center justify-center">
        <div class="text-center">
            <div class="text-9xl mb-10" style="animation: spin 2s infinite linear;">⭐</div>
            <h2 class="retro-font text-white text-xl mb-4">AISLE CLEAR!</h2>
            <p id="row-end-text" class="text-yellow-300 retro-font text-[8px] mb-10"></p>
            <button id="btn-next-row" class="btn-3d w-full bg-yellow-400 text-black py-5 rounded-2xl retro-font text-[10px]">NEXT WORLD</button>
        </div>
    </div>

    <!-- REPORT -->
    <main id="view-report" class="hidden flex-1 flex flex-col overflow-hidden p-3 space-y-3">
        <div id="report-body" class="flex-1 overflow-y-auto space-y-3"></div>
        <button onclick="sendEmailReport()" class="btn-3d w-full bg-blue-600 text-white py-4 rounded-xl retro-font text-[8px]">SEND SCOREBOARD</button>
    </main>

    <!-- ADD ITEM MODAL -->
    <div id="add-item-modal" class="hidden fixed inset-0 bg-black/80 z-[60] p-4 flex items-center justify-center">
        <div class="bg-white w-full max-w-sm rounded-3xl border-4 border-black p-6 space-y-4">
            <h2 class="retro-font text-[10px]">ADD PHYSICAL ITEM</h2>
            <input type="text" id="add-hu" placeholder="HU Number" class="w-full p-4 border-2 border-black rounded-xl font-bold" oninput="autoLookupExtra(this)">
            <input type="text" id="add-prod" placeholder="Product ID" class="w-full p-4 border-2 border-black rounded-xl font-bold">
            <input type="number" id="add-qty" placeholder="Count" class="w-full p-5 bg-yellow-50 border-2 border-black rounded-xl font-black text-center text-2xl outline-none">
            <div class="flex gap-3">
                <button onclick="toggleAddForm()" class="flex-1 retro-font text-[8px]">BACK</button>
                <button onclick="submitExtra()" class="btn-3d flex-[2] bg-orange-500 text-white py-4 rounded-xl retro-font text-[8px]">ADD ITEM</button>
            </div>
        </div>
    </div>

    <script>
        // --- SOUND ENGINE ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSFX(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            if (type === 'coin') {
                osc.type = 'square'; osc.frequency.setValueAtTime(987, now);
                osc.frequency.exponentialRampToValueAtTime(1318, now + 0.1);
                gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(now); osc.stop(now + 0.3);
            } else if (type === 'jump') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(600, now + 0.15);
                gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0, now + 0.15);
                osc.start(now); osc.stop(now + 0.15);
            } else if (type === 'star') {
                [0, 0.1, 0.2].forEach((t, i) => {
                    const o = audioCtx.createOscillator(); o.connect(gain); o.type = 'square';
                    o.frequency.setValueAtTime(523 * (1 + i*0.5), now + t); o.start(now + t); o.stop(now + t + 0.1);
                });
            } else if (type === 'buzz') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(110, now);
                gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0, now + 0.2);
                osc.start(now); osc.stop(now + 0.2);
            }
        }

        // --- CHARACTERS ---
        const chars = {
            mario: `<svg viewBox="0 0 16 16"><path fill="#f00" d="M4 0h8v2H4zM2 2h12v2H2zM0 4h16v3H0z"/><path fill="#fca" d="M3 7h10v4H3zM5 11h6v1H5z"/><path fill="#00f" d="M4 12h8v3H4z"/><circle cx="6" cy="9" r="1"/><circle cx="10" cy="9" r="1"/></svg>`,
            luigi: `<svg viewBox="0 0 16 16"><path fill="#0a0" d="M4 0h8v2H4zM2 2h12v2H2zM0 4h16v3H0z"/><path fill="#fca" d="M3 7h10v4H3zM5 11h6v1H5z"/><path fill="#00f" d="M4 12h8v3H4z"/><circle cx="6" cy="9" r="1"/><circle cx="10" cy="9" r="1"/></svg>`,
            peach: `<svg viewBox="0 0 16 16"><path fill="#f9c" d="M4 0h8v7H4z"/><path fill="#ff0" d="M4 0l2 2 2-2 2 2 2-2v2H4z"/><path fill="#fca" d="M5 3h6v4H5z"/><path fill="#f9c" d="M2 7h12v9H2z"/><circle cx="8" cy="5" r="1" fill="#0cf"/></svg>`,
            toad: `<svg viewBox="0 0 16 16"><path fill="#fff" d="M3 0h10v7H3z"/><circle fill="red" cx="8" cy="2" r="2"/><circle fill="red" cx="4" cy="4" r="2"/><circle fill="red" cx="12" cy="4" r="2"/><path fill="#fca" d="M5 7h6v4H5z"/><path fill="#fff" d="M4 11h8v5H4z"/></svg>`
        };

        // --- DATA STATE (INTEGRITY PRESERVED) ---
        let sapMasterData = JSON.parse(localStorage.getItem('sapMasterData')) || [];
        let auditLog = JSON.parse(localStorage.getItem('auditLog')) || []; 
        let currentBinItems = JSON.parse(localStorage.getItem('currentBinItems')) || [];
        let currentActiveBin = localStorage.getItem('currentActiveBin') || "";
        let binsAudited = new Set(JSON.parse(localStorage.getItem('binsAudited')) || []);
        let stars = parseInt(localStorage.getItem('stars')) || 0;
        let selectedCharacter = localStorage.getItem('selectedCharacter') || 'mario';

        function saveSession() {
            localStorage.setItem('sapMasterData', JSON.stringify(sapMasterData));
            localStorage.setItem('auditLog', JSON.stringify(auditLog));
            localStorage.setItem('currentBinItems', JSON.stringify(currentBinItems));
            localStorage.setItem('currentActiveBin', currentActiveBin);
            localStorage.setItem('binsAudited', JSON.stringify(Array.from(binsAudited)));
            localStorage.setItem('stars', stars);
            localStorage.setItem('selectedCharacter', selectedCharacter);
            updateGameUI();
        }

        function updateGameUI() {
            document.getElementById('star-count').innerText = stars;
            document.getElementById('hud-name').innerText = selectedCharacter;
            document.getElementById('track-char').innerHTML = chars[selectedCharacter];
            
            // World Map Update
            const map = document.getElementById('world-map');
            map.innerHTML = "";
            "ABCDEFGHIJKLMNOP".split("").forEach(row => {
                const isActive = currentActiveBin && currentActiveBin.charAt(1) === row;
                const div = document.createElement('div');
                div.className = `aisle-node shrink-0 ${isActive ? 'aisle-active' : ''}`;
                div.innerHTML = isActive ? chars[selectedCharacter] : row;
                if(isActive) div.scrollIntoView({behavior:'smooth', block:'center'});
                map.appendChild(div);
            });

            // Progress Track Update
            if(currentActiveBin) {
                const bay = parseInt(currentActiveBin.substring(2, 4)) || 0;
                const percent = currentActiveBin.endsWith("100") ? 100 : (bay / 39) * 100;
                document.getElementById('track-char').style.left = `${percent}%`;
                document.getElementById('current-bin-display').innerText = currentActiveBin;
            }
        }

        // --- ORIGINAL LOGIC (INTEGRITY PRESERVED) ---
        function getNextPhysicalBin(current) {
            if (!current) return null;
            let row = current.charAt(1);
            if (current.endsWith("100")) {
                let nextRow = String.fromCharCode(row.charCodeAt(0) + 1);
                return nextRow > 'P' ? null : `W${nextRow}00A`;
            }
            let bay = parseInt(current.substring(2, 4));
            let level = current.charAt(4);
            if (level === 'A') level = 'B';
            else if (level === 'B') level = 'C';
            else {
                if (bay >= 39) return `W${row}100`;
                else { level = 'A'; bay++; }
            }
            return `W${row}${bay.toString().padStart(2, '0')}${level}`;
        }

        function getPrevPhysicalBin(current) {
            if (!current) return null;
            let row = current.charAt(1);
            if (current.endsWith("100")) return `W${row}39C`;
            let bay = parseInt(current.substring(2, 4));
            let level = current.charAt(4);
            if (level === 'C') level = 'B';
            else if (level === 'B') level = 'A';
            else {
                if (bay === 0) return null;
                level = 'C'; bay--;
            }
            return `W${row}${bay.toString().padStart(2, '0')}${level}`;
        }

        function stepBin(dir) {
            playSFX('jump');
            const next = dir > 0 ? getNextPhysicalBin(currentActiveBin) : getPrevPhysicalBin(currentActiveBin);
            if (next) selectBin(next);
        }

        function loadBinData(binVal) {
            currentActiveBin = binVal.toUpperCase();
            const expected = sapMasterData.filter(i => i.sapBin === currentActiveBin);
            currentBinItems = expected.map(i => ({ 
                ...i, verified: false, isMissing: false, countQty: 0, isExtra: false, scannedBin: currentActiveBin 
            }));
            saveSession(); renderAuditList();
        }

        function selectBin(binName) {
            document.getElementById('bin-input').value = binName;
            loadBinData(binName);
            suggestBins("");
        }

        function finalizeBin() {
            if(!currentActiveBin) return;
            let errors = false;
            currentBinItems.forEach((item, index) => {
                if ((item.verified && item.countQty <= 0) || (!item.verified && !item.isMissing)) {
                    document.getElementById(`card-${index}`).classList.add('card-error'); errors = true;
                }
            });
            if (errors) { playSFX('buzz'); return; }
            
            auditLog.push(...currentBinItems);
            binsAudited.add(currentActiveBin);
            
            if (currentActiveBin.endsWith("100")) {
                stars++; playSFX('star');
                showRowEndPrompt(currentActiveBin.charAt(1), getNextPhysicalBin(currentActiveBin));
            } else {
                playSFX('coin');
                const next = getNextPhysicalBin(currentActiveBin);
                if (next) selectBin(next);
            }
            saveSession(); renderAuditList(); window.scrollTo(0,0);
        }

        function showRowEndPrompt(finishedRow, nextBin) {
            const modal = document.getElementById('row-end-modal');
            document.getElementById('row-end-text').innerText = `WORLD ${finishedRow} COMPLETE!`;
            const nextBtn = document.getElementById('btn-next-row');
            if (nextBin) {
                nextBtn.onclick = () => { modal.classList.add('hidden'); selectBin(nextBin); };
                nextBtn.classList.remove('hidden');
            } else { nextBtn.classList.add('hidden'); }
            modal.classList.remove('hidden');
        }

        function renderAuditList() {
            const container = document.getElementById('audit-list');
            container.innerHTML = "";
            if (currentBinItems.length === 0 && currentActiveBin !== "") {
                container.innerHTML = `<div class="p-10 text-center text-white retro-font text-[8px]">BIN EMPTY IN SAP</div>`;
            }
            currentBinItems.forEach((item, index) => {
                const card = document.createElement('div');
                card.id = `card-${index}`;
                card.className = `p-4 rounded-2xl game-card bg-white ${item.verified ? 'card-verified' : (item.isMissing ? 'card-missing' : (item.isExtra ? 'card-extra' : ''))}`;
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-3">
                        <div class="flex-1">
                            <span class="inline-block px-2 py-0.5 bg-black text-white font-mono text-[10px] rounded mb-2">HU: ${item.hu}</span>
                            <h3 class="text-sm font-black leading-tight">${item.product}</h3>
                        </div>
                        <div class="text-right">
                            <p class="text-[8px] font-black text-slate-400 uppercase">SAP Qty</p>
                            <p class="text-lg font-black text-slate-700">${item.isExtra ? '--' : item.sapQty}</p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        ${!item.isExtra ? `<button onclick="quickConfirm(${index})" class="btn-3d flex-1 bg-green-500 text-white py-3 rounded-xl retro-font text-[8px]">ALL ${item.sapQty}</button>` : ''}
                        <button onclick="toggleMissing(${index})" class="btn-3d flex-1 bg-red-500 text-white py-3 rounded-xl retro-font text-[8px]">MISSING</button>
                    </div>`;
                container.appendChild(card);
            });
        }

        function quickConfirm(idx) {
            playSFX('coin');
            currentBinItems[idx].countQty = currentBinItems[idx].sapQty;
            currentBinItems[idx].verified = true;
            currentBinItems[idx].isMissing = false;
            saveSession(); renderAuditList();
        }

        function toggleMissing(idx) { 
            currentBinItems[idx].isMissing = !currentBinItems[idx].isMissing; 
            if (currentBinItems[idx].isMissing) { currentBinItems[idx].verified = false; currentBinItems[idx].countQty = 0; } 
            saveSession(); renderAuditList(); 
        }

        // --- SETUP ---
        function selectChar(key) {
            playSFX('coin');
            selectedCharacter = key;
            document.getElementById('char-selection').classList.add('hidden');
            document.getElementById('upload-prompt').classList.remove('hidden');
            if(sapMasterData.length > 0) unlockAudit();
            saveSession();
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                const workbook = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
                const raw = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                sapMasterData = raw.map(row => ({
                    sapBin: String(row['Storage Bin'] || row['Storage bin'] || "").trim().toUpperCase(),
                    hu: String(row['Handling Unit'] || row['HU'] || "").trim(),
                    product: String(row['Product'] || ""),
                    desc: row['Product Short Description'] || "",
                    uom: row['Base Unit of Measure'] || "EA",
                    sapQty: parseFloat(row['Quantity']) || 0
                }));
                playSFX('star'); unlockAudit(); saveSession();
            };
            reader.readAsArrayBuffer(file);
        }

        function unlockAudit() {
            document.getElementById('upload-prompt').classList.add('hidden');
            document.getElementById('row-selection').classList.remove('hidden');
            const grid = document.getElementById('row-selection');
            grid.innerHTML = "";
            "ABCDEFGHIJKLMNOP".split("").forEach(row => {
                const btn = document.createElement('button');
                btn.className = "btn-3d bg-white p-4 rounded-xl retro-font text-xs";
                btn.innerText = row;
                btn.onclick = () => { playSFX('jump'); document.getElementById('setup-screen').classList.add('hidden'); selectBin(`W${row}00A`); };
                grid.appendChild(btn);
            });
            document.getElementById('data-status').innerText = `READY: ${sapMasterData.length} HU`;
        }

        window.onload = () => {
            Object.keys(chars).forEach(k => document.getElementById(`svg-${k}`).innerHTML = chars[k]);
            if (sapMasterData.length > 0) unlockAudit();
            if (currentActiveBin) {
                document.getElementById('setup-screen').classList.add('hidden');
                document.getElementById('bin-input').value = currentActiveBin;
                loadBinData(currentActiveBin);
            }
            updateGameUI();
        };

        // --- UTILS ---
        function suggestBins(val) {
            const container = document.getElementById('bin-suggestions');
            container.innerHTML = "";
            if (currentActiveBin) {
                const bayPrefix = currentActiveBin.substring(0, 4);
                ['A', 'B', 'C'].forEach(lvl => {
                    const btn = document.createElement('button');
                    btn.className = `btn-3d px-6 py-2 rounded-lg retro-font text-[8px] ${currentActiveBin.endsWith(lvl) && !currentActiveBin.endsWith("100") ? 'bg-yellow-400' : 'bg-white'}`;
                    btn.innerText = lvl;
                    btn.onclick = () => { playSFX('jump'); selectBin(bayPrefix + lvl); };
                    container.appendChild(btn);
                });
            }
        }
        function toggleAddForm() { document.getElementById('add-item-modal').classList.toggle('hidden'); }
        function switchView(view) {
            document.getElementById('view-audit').classList.toggle('hidden', view !== 'audit');
            document.getElementById('view-report').classList.toggle('hidden', view !== 'report');
            document.getElementById('nav-audit').classList.toggle('nav-active', view === 'audit');
            document.getElementById('nav-report').classList.toggle('nav-active', view === 'report');
        }
        function clearAllData() { if (confirm("RESET GAME?")) { localStorage.clear(); location.reload(); } }
    </script>
</body>
</html>
